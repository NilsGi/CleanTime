<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drogfri tid</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --na-blue: #1E4F9A;
      --na-blue-dark: #163D78;
      --na-blue-light: #EAF1FB;
      --text: #1f2937;
      --muted: #64748b;
      --bg: #f4f7fb;
      --white: #ffffff;
      --border: #dbe3ef;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, var(--na-blue-dark), var(--na-blue));
      color: white;
      text-align: center;
      padding: 42px 18px 75px;
    }

    .hero h1 {
      font-size: clamp(15px, 4vw, 21px);
      letter-spacing: 3px;
      margin-bottom: 18px;
      text-transform: uppercase;
      opacity: 0.96;
    }

    .counter {
      font-size: clamp(2.4rem, 11vw, 5rem);
      font-weight: 800;
      line-height: 1.12;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .hero-subtitle {
      font-size: clamp(17px, 4vw, 22px);
      opacity: 0.95;
      margin-bottom: 18px;
    }

    .hero-count {
      display: inline-block;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 10px 17px;
      font-size: 15px;
      backdrop-filter: blur(8px);
    }

    .wrap {
      width: min(100%, 560px);
      margin: -45px auto 42px;
      padding: 0 16px;
    }

    .card,
    .stat-card {
      width: 100%;
      background: var(--white);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(30, 79, 154, 0.08);
    }

    .card {
      padding: 24px;
      margin-bottom: 18px;
    }

    .card h2 {
      color: var(--na-blue);
      font-size: 22px;
      margin-bottom: 10px;
    }

    .helper-text {
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 18px;
      font-size: 15px;
    }

    label {
      display: block;
      text-align: left;
      color: var(--text);
      font-weight: 650;
      margin-bottom: 8px;
    }

    input[type="date"] {
      width: 100%;
      display: block;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 18px;
      background: #fff;
      color: var(--text);
      margin-bottom: 14px;
    }

    input[type="date"]:focus {
      outline: 3px solid rgba(30,79,154,0.18);
      border-color: var(--na-blue);
    }

    button {
      width: 100%;
      background: var(--na-blue);
      color: white;
      border: none;
      padding: 16px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 750;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: var(--na-blue-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      width: 100%;
    }

    .stat-card {
      padding: 22px;
      text-align: center;
    }

    .stat-title {
      color: var(--muted);
      margin-bottom: 9px;
      font-size: 15px;
      font-weight: 650;
    }

    .stat-value {
      color: var(--na-blue);
      font-size: clamp(1.45rem, 6vw, 2.05rem);
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 13px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.35;
    }

    .message.success {
      display: block;
      background: #eef7ff;
      color: var(--na-blue-dark);
      border: 1px solid #cfe2ff;
    }

    .message.error {
      display: block;
      background: #fff1f2;
      color: #9f1239;
      border: 1px solid #fecdd3;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      padding: 0 16px 34px;
      font-size: 15px;
    }

    @media (max-width: 430px) {
      .hero {
        padding-top: 34px;
        padding-bottom: 68px;
      }

      .wrap {
        margin-top: -38px;
        padding: 0 12px;
      }

      .card,
      .stat-card {
        border-radius: 18px;
      }

      .card {
        padding: 19px;
      }

      input[type="date"],
      button {
        font-size: 17px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Tillsammans har vi</h1>

    <div class="counter" id="mainCounter">
      Laddar...
    </div>

    <div class="hero-subtitle">
      av drogfrihet
    </div>

    <div class="hero-count">
      👥 <strong id="countHero">0</strong> registrerade personer
    </div>
  </section>

  <main class="wrap">

    <section class="card">
      <h2>Registrera din drogfria tid</h2>

      <p class="helper-text">
        Välj datumet då du blev drogfri. Inga namn eller e-postadresser sparas.
      </p>

      <form id="cleanForm">
        <label for="cleanDate">Datum då du blev drogfri</label>
        <input type="date" id="cleanDate" required />
        <button type="submit" id="submitButton">Registrera</button>
      </form>

      <div id="messageBox" class="message"></div>
    </section>

    <section class="stats-grid">

      <div class="stat-card">
        <div class="stat-title">👥 Personer</div>
        <div class="stat-value" id="count">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">⏳ Total tid</div>
        <div class="stat-value" id="total">0 dagar</div>
        <div class="stat-note" id="totalDaysNote"></div>
      </div>

      <div class="stat-card">
        <div class="stat-title">📊 Medel</div>
        <div class="stat-value" id="average">0 dagar</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">🏆 Längsta tid</div>
        <div class="stat-value" id="longest">0 dagar</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">🌱 Kortaste tid</div>
        <div class="stat-value" id="shortest">0 dagar</div>
      </div>

    </section>

  </main>

  <footer class="footer">
    En dag i taget ❤️
  </footer>

  <script>
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    let cleanEntries = [];

    function parseDateOnly(dateString) {
      const parts = dateString.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function todayDateOnly() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function daysBetween(dateString) {
      const cleanDate = parseDateOnly(dateString);
      const today = todayDateOnly();
      return Math.floor((today - cleanDate) / 86400000);
    }

    function formatApproxTime(totalDays) {
      if (totalDays <= 0) return "0 dagar";

      const years = Math.floor(totalDays / 365.25);
      const remainingAfterYears = totalDays - (years * 365.25);
      const months = Math.floor(remainingAfterYears / 30.4375);
      const days = Math.floor(remainingAfterYears - (months * 30.4375));

      const parts = [];

      if (years > 0) parts.push(years + " år");
      if (months > 0) parts.push(months + " månader");
      if (days > 0 || parts.length === 0) parts.push(days + " dagar");

      return parts.join(" ");
    }

    function formatCalendarTimeFromDate(dateString) {
      const start = parseDateOnly(dateString);
      const end = todayDateOnly();

      if (start > end) return "0 dagar";

      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const daysInPreviousMonth = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
        days += daysInPreviousMonth;
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      const parts = [];

      if (years > 0) parts.push(years + " år");
      if (months > 0) parts.push(months + " månader");
      if (days > 0 || parts.length === 0) parts.push(days + " dagar");

      return parts.join(" ");
    }

    function showMessage(text, type) {
      const box = document.getElementById("messageBox");
      box.textContent = text;
      box.className = "message " + type;
    }

    function clearMessage() {
      const box = document.getElementById("messageBox");
      box.textContent = "";
      box.className = "message";
    }

    function setEmptyStats() {
      document.getElementById("mainCounter").innerText = "0 dagar";
      document.getElementById("countHero").innerText = "0";
      document.getElementById("count").innerText = "0";
      document.getElementById("total").innerText = "0 dagar";
      document.getElementById("average").innerText = "0 dagar";
      document.getElementById("longest").innerText = "0 dagar";
      document.getElementById("shortest").innerText = "0 dagar";
      document.getElementById("totalDaysNote").innerText = "";
    }

    async function loadStats() {
      const { data, error } = await supabaseClient
        .from("clean_time_entries")
        .select("clean_date")
        .eq("is_active", true);

      if (error) {
        showMessage("Kunde inte hämta statistik: " + error.message, "error");
        console.log(error);
        setEmptyStats();
        return;
      }

      cleanEntries = data || [];

      if (cleanEntries.length === 0) {
        setEmptyStats();
        return;
      }

      updateStats();
    }

    function updateStats() {
      const validEntries = cleanEntries
        .map(entry => ({
          clean_date: entry.clean_date,
          days: daysBetween(entry.clean_date)
        }))
        .filter(entry => entry.days >= 0);

      if (validEntries.length === 0) {
        setEmptyStats();
        return;
      }

      const count = validEntries.length;
      const totalDays = validEntries.reduce((sum, entry) => sum + entry.days, 0);
      const averageDays = Math.floor(totalDays / count);

      const longestEntry = validEntries.reduce((a, b) => a.days >= b.days ? a : b);
      const shortestEntry = validEntries.reduce((a, b) => a.days <= b.days ? a : b);

      document.getElementById("mainCounter").innerText = formatApproxTime(totalDays);
      document.getElementById("countHero").innerText = count.toLocaleString("sv-SE");
      document.getElementById("count").innerText = count.toLocaleString("sv-SE");

      document.getElementById("total").innerText = formatApproxTime(totalDays);
      document.getElementById("totalDaysNote").innerText =
        totalDays.toLocaleString("sv-SE") + " dagar totalt";

      document.getElementById("average").innerText = formatApproxTime(averageDays);
      document.getElementById("longest").innerText = formatCalendarTimeFromDate(longestEntry.clean_date);
      document.getElementById("shortest").innerText = formatCalendarTimeFromDate(shortestEntry.clean_date);
    }

    document.getElementById("cleanForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      clearMessage();

      const cleanDate = document.getElementById("cleanDate").value;
      const selectedDate = parseDateOnly(cleanDate);
      const today = todayDateOnly();

      if (selectedDate > today) {
        showMessage("Datumet kan inte ligga i framtiden.", "error");
        return;
      }

      const button = document.getElementById("submitButton");
      button.disabled = true;
      button.innerText = "Registrerar...";

      const { error } = await supabaseClient
        .from("clean_time_entries")
        .insert([{ clean_date: cleanDate }]);

      button.disabled = false;
      button.innerText = "Registrera";

      if (error) {
        showMessage("Något gick fel: " + error.message, "error");
        console.log(error);
      } else {
        showMessage("Din drogfria tid är registrerad ❤️");
        document.getElementById("cleanForm").reset();
        loadStats();
      }
    });

    loadStats();
  </script>

</body>
</html>

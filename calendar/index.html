<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NA Sverige Event</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#status{
    text-align:center;
    margin-bottom:20px;
}

.event{
    background:#fff;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.field{
    margin-bottom:8px;
}

.field strong{
    display:inline-block;
    width:120px;
}

img{
    max-width:300px;
    margin-top:10px;
    border-radius:8px;
}

pre{
    background:#f7f7f7;
    padding:15px;
    overflow:auto;
    border-radius:8px;
    font-size:12px;
}
</style>
</head>
<body>

<h1>NA Sverige Evenemang</h1>

<div id="status">Laddar...</div>

<div id="events"></div>

<script>
async function loadEvents() {
    const status = document.getElementById("status");
    const container = document.getElementById("events");

    try {
        const response = await fetch("/event");

        if (!response.ok) {
            throw new Error(`Fel ${response.status}`);
        }

        const data = await response.json();

        console.log(data);

        const events =
            data.events ||
            data.data ||
            [];

        status.innerHTML =
            `${events.length} evenemang hittades`;

        container.innerHTML = "";

        events.forEach(event => {

            const e = event.attributes || event;

            let html = `
                <div class="event">
                    <h2>${e.title || "Namnlöst evenemang"}</h2>
            `;

            Object.entries(e).forEach(([key, value]) => {

                if (
                    value === null ||
                    value === undefined ||
                    value === ""
                ) {
                    return;
                }

                if (typeof value === "object") {
                    return;
                }

                html += `
                    <div class="field">
                        <strong>${key}</strong>
                        ${value}
                    </div>
                `;
            });

            // Försök visa bilder
            const images =
                e.images?.data ||
                e.images ||
                [];

            if (Array.isArray(images)) {
                images.forEach(img => {

                    const url =
                        img?.url ||
                        img?.attributes?.url;

                    if (url) {
                        html += `
                            <img src="${url.startsWith('http') ? url : 'https://cms.nasverige.org' + url}">
                        `;
                    }
                });
            }

            html += `
                <details>
                    <summary>Visa rå JSON</summary>
                    <pre>${escapeHtml(JSON.stringify(event, null, 2))}</pre>
                </details>
                </div>
            `;

            container.innerHTML += html;
        });

    } catch (error) {
        console.error(error);
        status.innerHTML =
            `Kunde inte hämta event: ${error.message}`;
    }
}

function escapeHtml(str) {
    return str.replace(/[&<>"']/g, function(match) {
        return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
        }[match];
    });
}

loadEvents();
</script>

</body>
</html>

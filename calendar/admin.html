<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin kalender</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

main {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

label {
  display: block;
  margin-top: 14px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  box-sizing: border-box;
  font-size: 16px;
}

textarea {
  min-height: 120px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

button {
  margin-top: 20px;
  padding: 12px 18px;
  font-size: 16px;
  cursor: pointer;
}

#log {
  margin-top: 20px;
  background: #f2f2f2;
  padding: 12px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<main>
  <h1>Lägg till kalenderhändelse</h1>

  <label>Typ</label>
  <select id="event_type" required>
    <option value="distrikt">Distrikt</option>
    <option value="uksam">UKSAM</option>
    <option value="region">Region</option>
  </select>

  <label>Titel</label>
  <input id="title" required>

  <label>Organisatör</label>
  <input id="organizer">

  <label>Adress</label>
  <input id="address">

  <div class="row">
    <div>
      <label>Startdatum</label>
      <input id="start_date" type="date" required>
    </div>
    <div>
      <label>Starttid</label>
      <input id="start_time" type="time" required>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Slutdatum</label>
      <input id="end_date" type="date">
    </div>
    <div>
      <label>Sluttid</label>
      <input id="end_time" type="time">
    </div>
  </div>

  <label>Länk</label>
  <input id="web_url" type="url" placeholder="https://...">

  <label>Excerpt / kort text</label>
  <textarea id="excerpt"></textarea>

  <label>Description / beskrivning</label>
  <textarea id="description"></textarea>

  <button onclick="saveEvent()">Spara händelse</button>

  <pre id="log"></pre>
</main>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const log = document.getElementById("log");

window.saveEvent = async function () {
  log.textContent = "Sparar...\n";

  const startDate = document.getElementById("start_date").value;
  const startTime = document.getElementById("start_time").value;

  const endDate = document.getElementById("end_date").value;
  const endTime = document.getElementById("end_time").value;

  if (!startDate || !startTime) {
    log.textContent = "Startdatum och starttid krävs.";
    return;
  }

  const startDateTime = combineDateTime(startDate, startTime);
  const endDateTime =
    endDate && endTime
      ? combineDateTime(endDate, endTime)
      : null;

  const row = {
    source: "manual",
    event_type: document.getElementById("event_type").value,

    title: document.getElementById("title").value.trim(),
    organizer: document.getElementById("organizer").value.trim() || null,
    address: document.getElementById("address").value.trim() || null,

    start_datetime: startDateTime,
    end_datetime: endDateTime,

    web_url: document.getElementById("web_url").value.trim() || null,
    excerpt: document.getElementById("excerpt").value.trim() || null,
    description: document.getElementById("description").value.trim() || null,

    is_published: true,
    is_hidden: false
  };

  if (!row.title) {
    log.textContent = "Titel krävs.";
    return;
  }

  const { data, error } = await supabase
    .from("calendar_events")
    .insert(row)
    .select()
    .single();

  if (error) {
    log.textContent = "FEL:\n" + JSON.stringify(error, null, 2);
    return;
  }

  log.textContent =
    "Klart! Händelsen är sparad.\n\n" +
    JSON.stringify(data, null, 2);

  clearForm();
};

function combineDateTime(date, time) {
  return `${date}T${time}:00`;
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("organizer").value = "";
  document.getElementById("address").value = "";
  document.getElementById("start_date").value = "";
  document.getElementById("start_time").value = "";
  document.getElementById("end_date").value = "";
  document.getElementById("end_time").value = "";
  document.getElementById("web_url").value = "";
  document.getElementById("excerpt").value = "";
  document.getElementById("description").value = "";
}
</script>

</body>
</html>

<html lang="sv"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NA Möten via Proxy</title>
<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:40px auto;padding:20px}
input,button{padding:10px;font-size:16px}
input{width:100%;margin-bottom:10px}
button{cursor:pointer}
pre{background:#f4f4f4;padding:15px;overflow:auto}
</style>
</head>
<body>
<h1>NA Sverige – Hämta möten</h1>

<p>Ange adressen till din Cloudflare Worker nedan.</p>

<input id="proxy" placeholder="https://na-moten-proxy.dittnamn.workers.dev/">
<button onclick="hamta()">Hämta möten</button>

<p id="status"></p>
<pre id="result"></pre>

<script>
async function hamta() {
  const proxy = document.getElementById('proxy').value.trim();
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  if (!proxy) {
    status.innerText = 'Ange adressen till din Cloudflare Worker.';
    return;
  }

  status.innerText = 'Hämtar...';
  result.textContent = '';

  try {
    const res = await fetch(proxy, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=UTF-8'
      },
      body: JSON.stringify({
        endpoint: '/meetings?pagination[page]=1&pagination[pageSize]=100'
      })
    });

    const text = await res.text();

    status.innerText = `HTTP ${res.status}`;

    try {
      const json = JSON.parse(text);
      result.textContent = JSON.stringify(json, null, 2);
    } catch {
      result.textContent = text;
    }
  } catch (e) {
    status.innerText = 'Fel: ' + e.message;
  }
}
</script>


</body></html>

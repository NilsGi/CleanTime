    (function clearOldCleanTimeCache() {
      var build = "20260705-standalone-004";
      var key = "clean-time-cache-cleared-" + build;
      function reloadOnce() {
        if (!sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, "1");
          window.location.replace(window.location.href);
        }
      }
      if ("caches" in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(cacheName) { return caches.delete(cacheName); }));
        }).catch(function() {});
      }
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (!registrations.length) return;
          return Promise.all(registrations.map(function(registration) { return registration.unregister(); })).then(reloadOnce);
        }).catch(function() {});
      }
    })();
  </script>

  <script>
(function () {
  const APP_VERSION = "20260705-004";

  const routes = {
    "": "menu",
    "/": "menu",
    "/index.html": "menu",
    "/register": "register",
    "/total": "total",
    "/statistics": "statistics",
    "/manual": "manual",
    "/history": "history",
    "/create": "create",
    "/admin": "admin",
    "/changelog": "changelog"
  };

  const pageFiles = {
    menu: "pages/menu.js",
    register: "pages/register.js",
    total: "pages/total.js",
    statistics: "pages/statistics.js",
    manual: "pages/manual.js",
    history: "pages/history.js",
    create: "pages/create.js",
    admin: "pages/admin.js",
    changelog: "pages/changelog.js"
  };

  const currentScriptUrl = document.currentScript && document.currentScript.src
    ? document.currentScript.src
    : window.location.href;
  const scriptBase = new URL(".", currentScriptUrl);
  const routeNames = new Set(Object.values(routes));

  const state = {
    pages: Object.create(null),
    currentPage: null
  };

  window.CleanTime = {
    registerPage(name, definition) {
      state.pages[name] = definition;
    },
    getBasePath() {
      return getBasePath();
    },
    routePath(route, params) {
      const basePath = getBasePath();
      const cleanRoute = String(route || "").replace(/^\/+|\/+$/g, "");
      const queryParams = params instanceof URLSearchParams
        ? new URLSearchParams(params)
        : new URLSearchParams(params || {});
      if (cleanRoute) queryParams.set("page", cleanRoute);
      const query = queryParams.toString();
      return query ? basePath + "?" + query : basePath;
    },
    routeUrl(route, params) {
      return window.location.origin + this.routePath(route, params);
    }
  };

  function normalizePath(pathname) {
    let path = pathname.replace(/\/+$/, "");
    if (!path) return "/";
    path = path.replace(/\/index\.html$/i, "");
    return path || "/";
  }

  function getPageName() {
    const pageParam = new URLSearchParams(window.location.search).get("page");
    if (routeNames.has(pageParam)) return pageParam;

    const path = normalizePath(window.location.pathname);
    if (routes[path]) return routes[path];

    const parts = path.split("/").filter(Boolean);
    const lastPart = parts[parts.length - 1] || "";
    return routeNames.has(lastPart) ? lastPart : "menu";
  }

  function getBasePath() {
    const parts = window.location.pathname.split("/").filter(Boolean);
    const lastPart = parts[parts.length - 1] || "";

    if (routeNames.has(lastPart) || lastPart === "index.html") {
      parts.pop();
    }

    return "/" + (parts.length ? parts.join("/") + "/" : "");
  }

  function routePath(route, params) {
    return window.CleanTime.routePath(route, params);
  }

  function rewriteInternalLinks(root) {
    const routeAliases = new Set(["register", "total", "statistics", "manual", "history", "create", "admin", "changelog"]);
    root.querySelectorAll("a[href]").forEach((anchor) => {
      const rawHref = anchor.getAttribute("href");
      if (!rawHref || rawHref === "#" || rawHref.startsWith("#")) return;

      let url;
      try {
        url = new URL(rawHref, window.location.href);
      } catch {
        return;
      }

      if (url.origin !== window.location.origin) return;

      const parts = url.pathname.split("/").filter(Boolean);
      const route = parts[parts.length - 1] || "";

      if (!routeAliases.has(route)) {
        if (url.pathname === "/" || url.pathname.endsWith("/index.html")) {
          anchor.href = routePath("", url.searchParams);
        }
        return;
      }

      url.searchParams.delete("page");
      anchor.href = routePath(route, url.searchParams);
    });
  }

  function unique(items) {
    return [...new Set(items.filter(Boolean))];
  }

  function resolvePageScripts(src) {
    const basePath = getBasePath();
    return unique([
      new URL(src, scriptBase).href,
      new URL("assets/js/" + src, window.location.origin + basePath).href,
      new URL("/assets/js/" + src, window.location.origin).href
    ]).map((url) => {
      const resolved = new URL(url);
      resolved.searchParams.set("v", APP_VERSION);
      return resolved.href;
    });
  }

  function loadScriptUrl(resolvedSrc) {
    return new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-page-src="${resolvedSrc}"]`);
      if (existing) {
        resolve();
        return;
      }

      const script = document.createElement("script");
      script.src = resolvedSrc;
      script.dataset.pageSrc = resolvedSrc;
      script.onload = () => resolve();
      script.onerror = () => {
        script.remove();
        reject(new Error("Kunde inte ladda " + resolvedSrc));
      };
      document.head.appendChild(script);
    });
  }

  async function loadPageDefinition(name, src) {
    if (state.pages[name]) return;

    const urls = resolvePageScripts(src);
    const errors = [];

    for (const url of urls) {
      try {
        await loadScriptUrl(url);
        if (state.pages[name]) return;
        errors.push("Ingen siddefinition i " + url);
      } catch (error) {
        errors.push(error.message);
      }
    }

    throw new Error(errors.join(" | "));
  }

  function renderPage(name) {
    const page = state.pages[name];
    const app = document.getElementById("app");

    if (!page || !app) return;

    state.currentPage = name;
    document.title = page.title || "Clean Time";
    document.body.className = "route-" + name;

    let style = document.getElementById("page-style");
    if (!style) {
      style = document.createElement("style");
      style.id = "page-style";
      document.head.appendChild(style);
    }

    style.textContent = page.style || "";
    app.innerHTML = page.html || "";
    rewriteInternalLinks(app);

    if (typeof page.init === "function") {
      try {
        page.init();
        rewriteInternalLinks(app);
      } catch (error) {
        console.error(error);
        const warning = document.createElement("div");
        warning.style.cssText = "max-width:760px;margin:16px auto;padding:12px;border:1px solid #fecdd3;border-radius:12px;background:#fff1f2;color:#9f1239;font-family:Segoe UI,Arial,sans-serif";
        warning.textContent = "Sidan laddades, men en funktion kunde inte starta. Kontrollera anslutning och konsolen.";
        app.prepend(warning);
      }
    }
  }

  async function boot() {
    const name = getPageName();
    const file = pageFiles[name] || pageFiles.menu;

    try {
      await loadPageDefinition(name, file);
      renderPage(name);
    } catch (error) {
      const app = document.getElementById("app");
      if (app) {
        app.innerHTML = '<main style="padding:24px;font-family:Segoe UI,Arial,sans-serif"><h1>Clean Time</h1><p>Kunde inte ladda sidan.</p><p style="color:#64748b;font-size:14px">Kontrollera att mappen <code>assets/js/pages</code> ligger bredvid <code>index.html</code>.</p></main>';
      }
      console.error(error);
    }
  }

  document.addEventListener("click", (event) => {
    const anchor = event.target.closest && event.target.closest("a[href]");
    if (!anchor) return;

    const rawHref = anchor.getAttribute("href");
    if (!rawHref || rawHref === "#" || rawHref.startsWith("#")) return;

    let url;
    try {
      url = new URL(rawHref, window.location.href);
    } catch {
      return;
    }

    if (url.origin !== window.location.origin) return;

    const routeAliases = new Set(["register", "total", "statistics", "manual", "history", "create", "admin", "changelog"]);
    const parts = url.pathname.split("/").filter(Boolean);
    const route = parts[parts.length - 1] || "";

    if (!routeAliases.has(route) && url.pathname !== "/" && !url.pathname.endsWith("/index.html")) return;

    url.searchParams.delete("page");
    const nextPath = routeAliases.has(route) ? routePath(route, url.searchParams) : routePath("", url.searchParams);

    if (nextPath !== url.pathname + url.search) {
      event.preventDefault();
      window.location.href = nextPath;
    }
  });

  document.addEventListener("click", (event) => {
    const menuButton = event.target.closest && event.target.closest("#registerButton, #totalButton, #manualButton, #statisticsButton, #historyButton, #createButton, #adminButton, #changelogButton");
    if (!menuButton) return;

    const routesById = {
      registerButton: "register",
      totalButton: "total",
      manualButton: "manual",
      statisticsButton: "statistics",
      historyButton: "history",
      createButton: "create",
      adminButton: "admin",
      changelogButton: "changelog"
    };

    const route = routesById[menuButton.id];
    if (!route) return;

    const needsEvent = new Set(["register", "total", "manual", "statistics"]);
    const selectedEvent = document.getElementById("eventSelect")?.value || localStorage.getItem("selectedEventSlug") || "";

    if (needsEvent.has(route) && !selectedEvent) return;

    event.preventDefault();
    event.stopImmediatePropagation();

    const targetPath = needsEvent.has(route)
      ? routePath(route, { event: selectedEvent })
      : routePath(route);

    window.location.assign(targetPath);
  }, true);

  document.addEventListener("DOMContentLoaded", boot);
})();

  </script>

          const totalDays = Math.max(0, Math.floor(Number(days) || 0));

          const averageMonthDays = 30.4375;
          const months = Math.floor(daysAfterYears / averageMonthDays);

          if (years > 0) parts.push(years + " " + t("year"));
          if (months > 0) parts.push(months + " " + pluralize(months, t("month"), t("months")));

          return parts.join(" ");

          }
    
          if (totalDays < 365.25) {

            const remainingDays = Math.round(totalDays - (months * averageMonthDays));
    
            let parts = [];
            if (months > 0) parts.push(months + " " + pluralize(months, t("month"), t("months")));

            console.log(existingError);
            return;
          }
    
          if (existingEntry && existingEntry.length > 0) {
            existingEntryId = existingEntry[0].id;
          }
    
          const rawDate = cleanDateInput.value;
    
          if (rawDate.length !== 8) {
            showMessage(t("errorDateFormat"), "error");
            return;
          }
    
          const cleanDate =
            rawDate.substring(0,4) + "-" +
            rawDate.substring(4,6) + "-" +
            rawDate.substring(6,8);
    
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
          if (Number.isNaN(selectedDate.getTime())) {
            showMessage(t("errorInvalidDate"), "error");
            return;
          }
    
          const inputYear = Number(rawDate.substring(0, 4));
    
          if (inputYear < 1953) {
            showMessage(t("errorTooOldDate"), "error");
            return;
          }
    
          if (selectedDate > today) {
            showMessage(t("errorFutureDate"), "error");
            return;
          }
    
          submitButton.disabled = true;
          submitButton.innerText = existingEntryId ? t("updating") : t("registering");
    
          let result;
    
          if (existingEntryId) {
            result = await supabaseClient
              .from("clean_time_entries")
              .update({
                clean_date: cleanDate,
                updated_at: new Date().toISOString()
              })
              .eq("id", existingEntryId)
              .eq("device_id", deviceId)
              .eq("event_id", eventId);
          } else {
            result = await supabaseClient
              .from("clean_time_entries")
              .insert([{
                clean_date: cleanDate,
                device_id: deviceId,
                event_id: eventId,
                created_by: "user"
              }]);
          }
    
          const { error } = result;
    
          
          submitButton.disabled = false;
          submitButton.innerText = existingEntryId ? t("updateButton") : t("registerButton");
    
          if (error) {
            if (error.message && error.message.includes("clean_time_device_unique")) {
              showMessage(t("errorOldUniqueIndex"), "error");
            } else if (error.message && error.message.includes("clean_time_device_event_unique")) {
              showMessage(t("errorAlreadyRegistered"), "error");
            } else {
              showMessage(t("errorGeneric") + " " + error.message, "error");
            }
            console.log(error);
          } else {
            showMessage(
              existingEntryId ? t("successUpdated") : t("successRegistered"),
              "success"
            );
            await loadExistingRegistration();
            await loadStats();
          }
        });
    
        document.getElementById("langSv").addEventListener("click", () => setLanguage("sv"));
        document.getElementById("langEn").addEventListener("click", () => setLanguage("en"));
    
        async function init() {
          setLanguage(language);
          const eventLoaded = await loadEvent();
          if (eventLoaded) {
            await loadExistingRegistration();
            await loadStats();
          }
        }
    
        init();
  }
});

        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";

          SUPABASE_URL,

        }
    
        function setText(id, value) {
          const element = document.getElementById(id);

        function pluralize(value, singular, plural) {

        }
    
        function setLanguage(lang) {
          language = lang;
          localStorage.setItem("language", lang);
          document.documentElement.lang = lang;
    
          document.getElementById("langSv").classList.toggle("active", lang === "sv");
          document.getElementById("langEn").classList.toggle("active", lang === "en");
    
          setText("topText", t("topText"));
          setText("bottomText", t("bottomText"));
    
          if (eventName) {
            document.title = eventName + " - " + t("pageTitle");
          } else {
            document.title = t("pageTitle");
          }
    
          renderInfo(latestTotalDays, latestPersonCount);
          updateTimeText();
        }
    
        function splitDays(totalDaysInput) {
          const totalDays = Math.max(0, Math.floor(Number(totalDaysInput) || 0));
          const years = Math.floor(totalDays / 365.25);
          const daysAfterYears = totalDays - Math.floor(years * 365.25);
          const months = Math.floor(daysAfterYears / 30.4375);
          const remainingDays = Math.round(daysAfterYears - (months * 30.4375));
    
          return { years, months, days: remainingDays };
        }
    
        function formatDetailFromDays(days) {
          const split = splitDays(days);
          const parts = [];
    
          if (split.years > 0) {
            parts.push(split.years + " " + t("year"));
          }
    
          if (split.months > 0) {
            parts.push(split.months + " " + pluralize(split.months, t("month"), t("months")));
          }
    
          if (split.days > 0 || parts.length === 0) {
            parts.push(split.days + " " + pluralize(split.days, t("day"), t("days")));
          }
    
          return parts.join(" ");
        }
    
        function buildDigitCard(char) {
          const card = document.createElement("div");
          card.className = "digit-card";
    
          const digit = document.createElement("div");
          digit.className = "digit";
          digit.textContent = char;
    
          card.appendChild(digit);
          return card;
        }
    
        function setCounterDigits(text) {
          const counter = document.getElementById("totalDaysCounter");
          counter.innerHTML = "";
    
          for (let i = 0; i < text.length; i++) {
            counter.appendChild(buildDigitCard(text[i]));
          }
        }
    
        function randomDigit() {
          return String(Math.floor(Math.random() * 10));

        function spinAllDigits(targetText) {
          const counter = document.getElementById("totalDaysCounter");
          const cards = Array.from(counter.querySelectorAll(".digit-card"));
          const digits = cards.map(card => card.querySelector(".digit"));
    
          const stopped = new Array(targetText.length).fill(false);
    
          const spinSpeed = 60;
          const spinTime = 4500;
          const stopDelay = 850;
          const flipLength = 950;
    
          // Alla siffror snurrar snabbt. Siffror som redan stannat lämnas orörda.
          const spinInterval = setInterval(() => {
            digits.forEach((digit, index) => {
              if (stopped[index]) return;
    
              digit.textContent = randomDigit();
    
              const card = cards[index];
              card.classList.remove("flip");
              void card.offsetWidth;
              card.classList.add("flip");
              setTimeout(() => card.classList.remove("flip"), 360);
            });
          }, spinSpeed);
    
          // Efter första snurrperioden låser vi siffrorna en i taget från höger till vänster.
          setTimeout(() => {
            for (let i = targetText.length - 1; i >= 0; i--) {
              const rightToLeftIndex = (targetText.length - 1) - i;
    
              setTimeout(() => {
                stopped[i] = true;
                digits[i].textContent = targetText[i];
    
                cards[i].classList.remove("flip");
                void cards[i].offsetWidth;
                cards[i].classList.add("flip");
                setTimeout(() => cards[i].classList.remove("flip"), flipLength + 100);
    
                // När vänstersta siffran stannat avslutas snurret.
                if (i === 0) {
                  setTimeout(() => {
                    clearInterval(spinInterval);
                    digits.forEach((digit, index) => {
                      digit.textContent = targetText[index];
                    });
                  }, flipLength);
                }
              }, rightToLeftIndex * stopDelay);
            }
          }, spinTime);
    
          return spinTime + ((targetText.length - 1) * stopDelay) + flipLength + 350;
        }
    
        function renderSplitCounter(value, animate = true) {
          const newText = String(value).padStart(7, "0");
    
          if (!animate) {
            setCounterDigits(newText);
            currentTotalDays = value;
            return Promise.resolve();
          }
    
          isAnimating = true;
          document.querySelector(".info-row").classList.add("hidden-info");
          setCounterDigits(String(currentTotalDays).padStart(7, "0"));
    
          const totalAnimationTime = spinAllDigits(newText);
    
          return new Promise(resolve => {

              isAnimating = false;
              resolve();
            }, totalAnimationTime);
          });
        }
    
        function renderInfo(totalDays, personCount) {
          document.getElementById("personCount").innerText =
            personCount.toLocaleString("sv-SE") +

            pluralize(personCount, t("person"), t("persons"));

        function updateTimeText() {

        }
    
        function showError(message) {

        }
    
        function hideError() {
          const errorBox = document.getElementById("errorBox");
          errorBox.style.display = "none";
          errorBox.innerText = "";
        }
    
        async function renderAll(totalDays, personCount, animate = true) {
          latestTotalDays = totalDays;
          latestPersonCount = personCount;
    
          await renderSplitCounter(totalDays, animate);
    
          // Informationen visas först efter att alla siffror har snurrat klart.
          renderInfo(totalDays, personCount);
          updateTimeText();
          document.querySelector(".info-row").classList.remove("hidden-info");
        }
    
        async function loadEvent() {
          const params = new URLSearchParams(window.location.search);
          eventSlug = params.get("event");
    
          if (!eventSlug) {
            document.getElementById("eventTitle").innerText = t("allEvents");
            return false;
          }
    
          const { data, error } = await supabaseClient
            .from("events")
            .select("id,name")
            .eq("slug", eventSlug)
            .single();
    
          if (error || !data) {
            document.getElementById("eventTitle").innerText = t("eventNotFound");
            console.log(error);
            return false;
          }
    
          eventId = data.id;
          eventName = data.name;
    
          document.getElementById("eventTitle").innerText = eventName.toUpperCase();
          document.title = eventName + " - " + t("pageTitle");
    
          return true;
        }
    
        async function loadTotalTime() {
          if (isAnimating) return;
    
          let query;
    
          if (eventId) {
            query = supabaseClient
              .from("clean_time_summary_by_event")
              .select("person_count,total_days")
              .eq("event_id", eventId);
          } else {
            query = supabaseClient
              .from("clean_time_summary")
              .select("person_count,total_days");
          }
    
          const { data, error } = await query.limit(1);
    
          if (error) {
            showError(t("errorStats") + " " + error.message);
            await renderAll(0, 0, true);
            return;
          }
    
          hideError();
    
          const row = data && data.length > 0 ? data[0] : null;
    
          const totalDays = Math.max(0, Math.floor(Number(row?.total_days) || 0));
          const personCount = Math.max(0, Math.floor(Number(row?.person_count) || 0));
    
          await renderAll(totalDays, personCount, !firstRender);
          firstRender = false;
        }
    
        async function init() {
          setLanguage(language);
    
          currentTotalDays = 0;
    
          await loadEvent();
    
          await loadTotalTime();
        }
    
        document.getElementById("langSv").addEventListener("click", () => setLanguage("sv"));
        document.getElementById("langEn").addEventListener("click", () => setLanguage("en"));
    
        init();
    
        setInterval(loadTotalTime, 60000);
  }
});

  style: ":root {\n      --na-blue: #1E4F9A;\n      --na-blue-dark: #163D78;\n      --text: #1f2937;\n      --muted: #64748b;\n      --bg: #f4f7fb;\n      --white: #ffffff;\n      --border: #dbe3ef;\n      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);\n    }\n\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n\n    body {\n      font-family: \"Segoe UI\", Arial, sans-serif;\n      background: var(--bg);\n      color: var(--text);\n      min-height: 100vh;\n    }\n\n    .hero {\n      background: linear-gradient(135deg, var(--na-blue-dark), var(--na-blue));\n      color: white;\n      text-align: center;\n      padding: 42px 18px 75px;\n    }\n\n    .hero h1 {\n      font-size: clamp(26px, 7vw, 44px);\n      margin-bottom: 12px;\n      font-weight: 850;\n    }\n\n    .hero p {\n      font-size: 17px;\n      opacity: 0.92;\n      line-height: 1.4;\n    }\n\n    .wrap {\n      width: min(100%, 760px);\n      margin: -45px auto 42px;\n      padding: 0 16px;\n      position: relative;\n      z-index: 10;\n    }\n\n    .card {\n      width: 100%;\n      background: var(--white);\n      border-radius: 22px;\n      box-shadow: var(--shadow);\n      border: 1px solid rgba(30, 79, 154, 0.08);\n      padding: 24px;\n      margin-bottom: 18px;\n      position: relative;\n      z-index: 11;\n    }\n\n    .card h2 {\n      color: var(--na-blue);\n      font-size: 22px;\n      margin-bottom: 10px;\n    }\n\n    .helper-text {\n      color: var(--muted);\n      line-height: 1.45;\n      margin-bottom: 18px;\n      font-size: 15px;\n    }\n\n    label {\n      display: block;\n      color: var(--text);\n      font-weight: 700;\n      margin-bottom: 8px;\n    }\n\n    select {\n      display: block;\n      width: 100%;\n      padding: 16px;\n      border-radius: 14px;\n      border: 1px solid var(--border);\n      font-size: 18px;\n      background: #fff;\n      color: var(--text);\n      margin-bottom: 14px;\n    }\n\n    .selected-event {\n      background: #eef7ff;\n      border: 1px solid #cfe2ff;\n      color: var(--na-blue-dark);\n      padding: 13px;\n      border-radius: 14px;\n      margin-top: 8px;\n      font-size: 15px;\n      line-height: 1.35;\n    }\n\n    .event-display-title {\n      text-align: center;\n      color: var(--na-blue);\n      font-size: clamp(28px, 7vw, 42px);\n      font-weight: 900;\n      line-height: 1.15;\n      margin-bottom: 18px;\n      text-transform: uppercase;\n    }\n\n    .stat-card {\n      background: var(--white);\n      border-radius: 22px;\n      box-shadow: var(--shadow);\n      border: 1px solid rgba(30, 79, 154, 0.08);\n      padding: 24px;\n      margin-bottom: 18px;\n      text-align: center;\n      position: relative;\n      z-index: 11;\n    }\n\n    .stat-title {\n      color: var(--na-blue-dark);\n      font-size: 14px;\n      font-weight: 750;\n      margin-bottom: 8px;\n    }\n\n    .stat-value {\n      color: var(--na-blue);\n      font-size: clamp(28px, 7vw, 42px);\n      font-weight: 900;\n      line-height: 1.15;\n      margin-bottom: 7px;\n    }\n\n    .stat-detail {\n      color: var(--text);\n      font-size: 15px;\n      font-weight: 650;\n      margin-bottom: 6px;\n    }\n\n    .stat-note {\n      color: var(--muted);\n      font-size: 13px;\n      line-height: 1.35;\n    }\n\n    .summary-grid {\n      display: grid;\n      grid-template-columns: repeat(3, 1fr);\n      gap: 12px;\n      margin-top: 16px;\n    }\n\n    .summary-box {\n      background: #f4f7fb;\n      border: 1px solid var(--border);\n      border-radius: 16px;\n      padding: 15px;\n      text-align: center;\n    }\n\n    .summary-label {\n      color: var(--muted);\n      font-size: 13px;\n      font-weight: 700;\n      margin-bottom: 6px;\n    }\n\n    .summary-value {\n      color: var(--na-blue);\n      font-size: 25px;\n      font-weight: 850;\n    }\n\n    .table-wrap {\n      overflow-x: auto;\n      border-radius: 16px;\n      border: 1px solid var(--border);\n      margin-top: 14px;\n    }\n\n    table {\n      width: 100%;\n      border-collapse: collapse;\n      background: white;\n      table-layout: fixed;\n    }\n\n    th, td {\n      padding: 12px;\n      text-align: left;\n      border-bottom: 1px solid var(--border);\n      font-size: 15px;\n    }\n\n    th {\n      background: #f4f7fb;\n      font-weight: 800;\n      color: var(--text);\n    }\n\n    tr:last-child td { border-bottom: none; }\n\n    th:first-child,\n    td:first-child {\n      width: auto;\n      word-break: break-word;\n    }\n\n    th:last-child,\n    td:last-child {\n      width: 76px;\n      text-align: center;\n      font-weight: 800;\n      white-space: nowrap;\n    }\n\n    \n    .message {\n      display: none;\n      margin-top: 14px;\n      padding: 13px;\n      border-radius: 14px;\n      font-size: 15px;\n      line-height: 1.35;\n    }\n\n    .message.error {\n      display: block;\n      background: #fff1f2;\n      color: #9f1239;\n      border: 1px solid #fecdd3;\n    }\n\n    .back-button {\n      display: block;\n      width: 100%;\n      text-align: center;\n      text-decoration: none;\n      background: #64748b;\n      color: white;\n      padding: 16px 22px;\n      border-radius: 14px;\n      font-size: 17px;\n      font-weight: 750;\n      margin-top: 12px;\n    }\n\n    .footer {\n      text-align: center;\n      color: var(--muted);\n      padding: 0 16px 34px;\n      font-size: 15px;\n    }\n\n    .footer-logo {\n      display: block;\n      width: min(100%, 360px);\n      max-width: 360px;\n      height: auto;\n      margin: 0 auto;\n    }\n\n    @media (max-width: 560px) {\n      .hero { padding-top: 34px; padding-bottom: 68px; }\n      .wrap { margin-top: -38px; padding: 0 12px; }\n      .card { border-radius: 18px; padding: 19px; }\n      .summary-grid { grid-template-columns: 1fr; }\n      select { font-size: 17px; padding: 15px; }\n      th, td { font-size: 14px; padding: 10px 8px; }\n\n      th:last-child,\n      td:last-child {\n        width: 64px;\n      }\n\n      .footer-logo {\n        width: min(88vw, 310px);\n      }\n    }",
  html: "<section class=\"hero\">\n    <h1>Drogfri tid - statistik</h1>\n    <p>Årtal, milstolpar och fördelning av drogfri tid</p>\n  </section>\n\n  <main class=\"wrap\">\n\n    <section class=\"card\">\n      <div class=\"event-display-title\" id=\"selectedEventInfo\">Laddar event...</div>\n      <div id=\"messageBox\" class=\"message\"></div>\n\n      <a href=\"./\" class=\"back-button\">← Till huvudmenyn</a>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-value\" id=\"statsPersonCount\">0 personer</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Total tid</div>\n      <div class=\"stat-value\" id=\"statsTotalYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsTotalDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsTotalNote\">0 dagar totalt</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Medel</div>\n      <div class=\"stat-value\" id=\"statsAverageYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsAverageDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsAverageNote\">0 dagar i genomsnitt</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Längsta tid</div>\n      <div class=\"stat-value\" id=\"statsLongestYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsLongestDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsLongestNote\">0 dagar</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Kortaste tid</div>\n      <div class=\"stat-value\" id=\"statsShortestYears\">0 dagar</div>\n      <div class=\"stat-detail\" id=\"statsShortestDetail\"></div>\n      <div class=\"stat-note\" id=\"statsShortestNote\">0 dagar</div>\n    </section>\n\n    <section class=\"card\">\n      <h2>Milstolpar idag</h2>\n      <p class=\"helper-text\">\n        Antal personer som exakt idag har uppnått en viss drogfri tid.\n        Månader och år räknas som riktiga kalenderdatum. (Kan vara till hjälp vid tex countdown)\n      </p>\n      <div class=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Milstolpe</th>\n              <th>Antal</th>\n            </tr>\n          </thead>\n          <tbody id=\"milestoneTableBody\">\n            <tr><td colspan=\"2\">Välj ett event.</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <h2>Fördelning efter drogfri tid</h2>\n      <p class=\"helper-text\">Antal personer grupperat efter varje tidsintervall.</p>\n      <div class=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Drogfri tid</th>\n              <th>Antal</th>\n            </tr>\n          </thead>\n          <tbody id=\"rangeTableBody\">\n            <tr><td colspan=\"2\">Välj ett event.</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </section>\n\n\n\n<section class=\"card\">\n      <h2>Årtal för drogfrihet</h2>\n      <p class=\"helper-text\">Antal personer grupperat efter vilket år de blev drogfria.</p>\n      <div class=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Årtal</th>\n              <th>Antal</th>\n            </tr>\n          </thead>\n          <tbody id=\"yearTableBody\">\n            <tr><td colspan=\"2\">Välj ett event.</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <h2>Hur räknas tiden?</h2>\n      <p class=\"helper-text\">\n        Drogfri tid räknas i databasen utifrån registrerat datum fram till dagens datum.\n        Sidan hämtar färdigräknad statistik från databasen och visar antal dagar,\n        antal personer, total tid, medelvärde, längsta tid och kortaste tid.\n        I statistikrutorna räknas år som 365,25 dagar och en månad som cirka 30,44 dagar.\n      </p>\n    </section>\n\n  </main>\n\n  <div class=\"service-credit service-credit-statistics\">Denna webbapp är ett serviceverktyg utvecklat av NA Region Sveriges webbkommitté för Anonyma Narkomaner Sverige. Narcotics Anonymous® och NA-logotyper används inom NA:s servicestruktur.</div>\n<footer class=\"footer\">\n    <img\n      src=\"/assets/na-logo.png\"\n      alt=\"Narcotics Anonymous, Anonyma Narkomaner\"\n      class=\"footer-logo\"\n    >\n  </footer>",
  init: function initStatisticsPage() {
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";
    
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
        const selectedEventInfo = document.getElementById("selectedEventInfo");
        const messageBox = document.getElementById("messageBox");
        const yearTableBody = document.getElementById("yearTableBody");
        const rangeTableBody = document.getElementById("rangeTableBody");
        const milestoneTableBody = document.getElementById("milestoneTableBody");
    
        let events = [];
        let selectedEventId = "";
        let selectedEvent = null;
    
        function showError(text) {
          messageBox.textContent = text;
          messageBox.className = "message error";
        }
    
        function clearError() {
          messageBox.textContent = "";
          messageBox.className = "message";
        }
    
        function daysBetween(cleanDate) {
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          return Math.floor((today - selectedDate) / 86400000);
        }
    
        function pluralize(value, singular, plural) {
          return value === 1 ? singular : plural;
        }
    
        function formatDetailFromDays(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const years = Math.floor(totalDays / 365.25);
          const daysAfterYears = totalDays - Math.floor(years * 365.25);
          const averageMonthDays = 30.4375;
          const months = Math.floor(daysAfterYears / averageMonthDays);
          const remainingDays = Math.round(daysAfterYears - (months * averageMonthDays));
    
          let parts = [];
          if (years > 0) parts.push(years + " år");
          if (months > 0) parts.push(months + " " + pluralize(months, "månad", "månader"));
          if (remainingDays > 0 || parts.length === 0) {
            parts.push(remainingDays + " " + pluralize(remainingDays, "dag", "dagar"));
          }
    
          return parts.join(" ");
        }
    
        function formatShortValue(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const averageMonthDays = 30.4375;
    
          if (totalDays < averageMonthDays) {
            return totalDays + " " + pluralize(totalDays, "dag", "dagar");
          }
    
          if (totalDays < 365.25) {
            const months = Math.floor(totalDays / averageMonthDays);
            const remainingDays = Math.round(totalDays - (months * averageMonthDays));
    
            let parts = [];
            if (months > 0) parts.push(months + " " + pluralize(months, "månad", "månader"));
            if (remainingDays > 0) parts.push(remainingDays + " " + pluralize(remainingDays, "dag", "dagar"));
    
            return parts.join(" ");
          }
    
          return null;
        }
    
        function formatStatsFromDays(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const decimalYears = (totalDays / 365.25).toFixed(1).replace(".", ",");
    
          return {
            yearsDecimal: decimalYears + " år",
            detail: "(" + formatDetailFromDays(totalDays) + ")",
            daysText: totalDays.toLocaleString("sv-SE") + " " + pluralize(totalDays, "dag", "dagar")
          };
        }
    
        function resetTopStats() {
          const zero = formatStatsFromDays(0);
    
          document.getElementById("statsPersonCount").innerText = "0 personer";
          document.getElementById("statsTotalYears").innerText = zero.yearsDecimal;
          document.getElementById("statsTotalDetail").innerText = zero.detail;
          document.getElementById("statsTotalNote").innerText = zero.daysText + " totalt";
          document.getElementById("statsAverageYears").innerText = zero.yearsDecimal;
          document.getElementById("statsAverageDetail").innerText = zero.detail;
          document.getElementById("statsAverageNote").innerText = zero.daysText + " i genomsnitt";
          document.getElementById("statsLongestYears").innerText = zero.yearsDecimal;
          document.getElementById("statsLongestDetail").innerText = zero.detail;
          document.getElementById("statsLongestNote").innerText = zero.daysText;
          document.getElementById("statsShortestYears").innerText = "0 dagar";
          document.getElementById("statsShortestDetail").innerText = "";
          document.getElementById("statsShortestNote").innerText = zero.daysText;
        }
    
        function updateTopStatsFromSummary(row) {
          if (!row || Number(row.person_count || 0) === 0) {
            resetTopStats();
            return;
          }
    
          const personCount = Number(row.person_count || 0);
          const totalDays = Number(row.total_days || 0);
          const averageDays = Math.floor(Number(row.average_days || 0));
          const longestDays = Number(row.longest_days || 0);
          const shortestDays = Number(row.shortest_days || 0);
    
          const total = formatStatsFromDays(totalDays);
          const average = formatStatsFromDays(averageDays);
          const longest = formatStatsFromDays(longestDays);
          const shortest = formatStatsFromDays(shortestDays);
          const shortestShortValue = formatShortValue(shortestDays);
    
          document.getElementById("statsPersonCount").innerText =
            personCount.toLocaleString("sv-SE") + " " + pluralize(personCount, "person", "personer");
    
          document.getElementById("statsTotalYears").innerText = total.yearsDecimal;
          document.getElementById("statsTotalDetail").innerText = total.detail;
          document.getElementById("statsTotalNote").innerText = total.daysText + " totalt";
    
          document.getElementById("statsAverageYears").innerText = average.yearsDecimal;
          document.getElementById("statsAverageDetail").innerText = average.detail;
          document.getElementById("statsAverageNote").innerText = average.daysText + " i genomsnitt";
    
          document.getElementById("statsLongestYears").innerText = longest.yearsDecimal;
          document.getElementById("statsLongestDetail").innerText = longest.detail;
          document.getElementById("statsLongestNote").innerText = longest.daysText;
    
          if (shortestShortValue !== null) {
            document.getElementById("statsShortestYears").innerText = shortestShortValue;
            document.getElementById("statsShortestDetail").innerText = "";
          } else {
            document.getElementById("statsShortestYears").innerText = shortest.yearsDecimal;
            document.getElementById("statsShortestDetail").innerText = shortest.detail;
          }
    
          document.getElementById("statsShortestNote").innerText = shortest.daysText;
        }
    
    
        function updateSelectedEventInfo() {
          selectedEvent = events.find(event => event.id === selectedEventId) || null;
    
          if (!selectedEvent) {
            selectedEventInfo.innerText = "EVENT SAKNAS";
            return;
          }
    
          selectedEventInfo.innerText = selectedEvent.name;
        }
    
        async function loadEvents() {
          const { data, error } = await supabaseClient
            .from("events")
            .select("id,name,slug,is_active")
            .eq("is_active", true)
            .order("name", { ascending: true });
    
          if (error) {
            selectedEventInfo.innerText = "EVENT KUNDE INTE HÄMTAS";
            showError("Kunde inte hämta event: " + error.message);
            return;
          }
    
          events = data || [];
    
          const params = new URLSearchParams(window.location.search);
          const eventSlug = params.get("event") || localStorage.getItem("selectedEventSlug");
    
          if (eventSlug) {
            const event = events.find(item => item.slug === eventSlug);
            if (event) {
              selectedEventId = event.id;
              localStorage.setItem("selectedEventSlug", event.slug);
            }
          }
    
          updateSelectedEventInfo();
    
          if (selectedEventId) {
            await loadStatistics();
          } else {
            resetStatistics();
          }
        }
    
        function addMonths(date, months) {
          const result = new Date(date.getTime());
          const originalDay = result.getDate();
    
          result.setMonth(result.getMonth() + months);
    
          // Hantera datum som 31 januari + 1 månad, där JS annars kan hoppa in i mars.
          if (result.getDate() < originalDay) {
            result.setDate(0);
          }
    
          return result;
        }
    
        function addYears(date, years) {
          const result = new Date(date.getTime());
          result.setFullYear(result.getFullYear() + years);
          return result;
        }
    
        function cleanDateToLocalDate(cleanDate) {
          return new Date(cleanDate + "T00:00:00");
        }
    
        function todayLocalDate() {
          const now = new Date();
          return new Date(now.getFullYear(), now.getMonth(), now.getDate());
        }
    
        function formatDateKey(date) {
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");
          return year + "-" + month + "-" + day;
        }
    
        function isSameLocalDate(first, second) {
          return formatDateKey(first) === formatDateKey(second);
        }
    
        function getExactMilestonesToday(entries) {
          const today = todayLocalDate();
    
          const milestones = [];
    
          for (let day = 0; day <= 30; day++) {
            milestones.push({
              label: day + " " + pluralize(day, "dag", "dagar"),
              type: "days",
              value: day,
              sortOrder: day
            });
          }
    
          milestones.push(
            { label: "60 dagar", type: "days", value: 60, sortOrder: 60 },
            { label: "90 dagar", type: "days", value: 90, sortOrder: 90 },
            { label: "6 månader", type: "months", value: 6, sortOrder: 180 },
            { label: "9 månader", type: "months", value: 9, sortOrder: 270 },
            { label: "1 år", type: "years", value: 1, sortOrder: 365 },
            { label: "18 månader", type: "months", value: 18, sortOrder: 545 }
          );
    
          const maxYears = Math.max(
            2,
            ...entries.map(entry => fullYearsSince(entry.clean_date, today))
          );
    
          for (let year = 2; year <= maxYears; year++) {
            milestones.push({
              label: year + " år",
              type: "years",
              value: year,
              sortOrder: 1000 + year
            });
          }
    
          return milestones.map(milestone => {
            const count = entries.filter(entry => {
              const start = cleanDateToLocalDate(entry.clean_date);
    
              if (milestone.type === "days") {
                return daysBetween(entry.clean_date) === milestone.value;
              }
    
              if (milestone.type === "months") {
                return isSameLocalDate(addMonths(start, milestone.value), today);
              }
    
              if (milestone.type === "years") {
                return isSameLocalDate(addYears(start, milestone.value), today);
              }
    
              return false;
            }).length;
    
            return {
              label: milestone.label,
              count,
              sortOrder: milestone.sortOrder
            };
          }).filter(row => row.count > 0)
            .sort((a, b) => a.sortOrder - b.sortOrder);
        }
    
        function fullYearsSince(cleanDate, today) {
          const start = cleanDateToLocalDate(cleanDate);
          let years = today.getFullYear() - start.getFullYear();
    
          const anniversary = addYears(start, years);
    
          if (today < anniversary) {
            years--;
          }
    
          return Math.max(0, years);
        }
    
        function getExactRangeLabel(cleanDate) {
          const start = cleanDateToLocalDate(cleanDate);
          const today = todayLocalDate();
          const days = daysBetween(cleanDate);
    
          if (days <= 29) return "Mindre än 30 dagar";
          if (days <= 59) return "30 dagar";
          if (days <= 89) return "60 dagar";
    
          const sixMonths = addMonths(start, 6);
          const nineMonths = addMonths(start, 9);
          const oneYear = addYears(start, 1);
          const eighteenMonths = addMonths(start, 18);
          const twoYears = addYears(start, 2);
    
          if (today < sixMonths) return "90 dagar";
          if (today < nineMonths) return "6 månader";
          if (today < oneYear) return "9 månader";
          if (today < eighteenMonths) return "1 år";
          if (today < twoYears) return "18 månader";
    
          const years = fullYearsSince(cleanDate, today);
          return years + " år";
        }
    
        function getRangeSortOrder(label) {
          const fixedOrder = {
            "Mindre än 30 dagar": 1,
            "30 dagar": 2,
            "60 dagar": 3,
            "90 dagar": 4,
            "6 månader": 5,
            "9 månader": 6,
            "1 år": 7,
            "18 månader": 8
          };
    
          if (fixedOrder[label]) {
            return fixedOrder[label];
          }
    
          const yearMatch = label.match(/^(\d+) år$/);
          if (yearMatch) {
            return 1000 + Number(yearMatch[1]);
          }
    
          return 9999;
        }
    
        function groupByCleanYear(entries) {
          const map = new Map();
    
          entries.forEach(entry => {
            const year = String(entry.clean_date || "").substring(0, 4);
            if (!year || year.length !== 4) return;
            map.set(year, (map.get(year) || 0) + 1);
          });
    
          return Array.from(map.entries())
            .map(([year, count]) => ({ year, count }))
            .sort((a, b) => Number(a.year) - Number(b.year));
        }
    
        function groupByRanges(entries) {
          const map = new Map();
    
          entries.forEach(entry => {
            const label = getExactRangeLabel(entry.clean_date);
            map.set(label, (map.get(label) || 0) + 1);
          });
    
          return Array.from(map.entries())
            .map(([label, count]) => ({
              label,
              count,
              sortOrder: getRangeSortOrder(label)
            }))
            .sort((a, b) => a.sortOrder - b.sortOrder);
        }
    
        function renderRows(target, rows, labelKey, emptyText) {
          if (!rows.length) {
            target.innerHTML = `<tr><td colspan="2">${emptyText}</td></tr>`;
            return;
          }
    
          target.innerHTML = rows.map(row => `
              <tr>
                <td>${row[labelKey]}</td>
                <td>${row.count}</td>
              </tr>
          `).join("");
        }
    
        function resetStatistics() {
          resetTopStats();
          yearTableBody.innerHTML = '<tr><td colspan="2">Välj ett event.</td></tr>';
          rangeTableBody.innerHTML = '<tr><td colspan="2">Välj ett event.</td></tr>';
          milestoneTableBody.innerHTML = '<tr><td colspan="2">Välj ett event.</td></tr>';
        }
    
        async function loadStatistics() {
          clearError();
    
          if (!selectedEventId) {
            resetStatistics();
            return;
          }
    
          yearTableBody.innerHTML = '<tr><td colspan="2">Laddar...</td></tr>';
          rangeTableBody.innerHTML = '<tr><td colspan="2">Laddar...</td></tr>';
          milestoneTableBody.innerHTML = '<tr><td colspan="2">Laddar...</td></tr>';
    
          const { data: summaryData, error: summaryError } = await supabaseClient
            .from("clean_time_summary_by_event")
            .select("person_count,total_days,average_days,longest_days,shortest_days")
            .eq("event_id", selectedEventId)
            .limit(1);
    
          if (summaryError) {
            showError("Kunde inte hämta sammanfattning: " + summaryError.message);
            resetTopStats();
          } else {
            const summaryRow = summaryData && summaryData.length > 0 ? summaryData[0] : null;
            updateTopStatsFromSummary(summaryRow);
          }
    
          const { data, error } = await supabaseClient
            .from("clean_time_entries")
            .select("id, clean_date, event_id, is_active")
            .eq("event_id", selectedEventId)
            .eq("is_active", true)
            .order("clean_date", { ascending: true });
    
          if (error) {
            showError("Kunde inte hämta statistik: " + error.message);
            yearTableBody.innerHTML = '<tr><td colspan="2">Kunde inte hämta statistik.</td></tr>';
            rangeTableBody.innerHTML = '<tr><td colspan="2">Kunde inte hämta statistik.</td></tr>';
            milestoneTableBody.innerHTML = '<tr><td colspan="2">Kunde inte hämta statistik.</td></tr>';
            return;
          }
    
          const entries = data || [];
          const byYear = groupByCleanYear(entries);
          const byRange = groupByRanges(entries);
          const milestonesToday = getExactMilestonesToday(entries);
    
          renderRows(milestoneTableBody, milestonesToday, "label", "Inga milstolpar idag.");

\n    <img\n      src=\"/assets/na-logo.png\"\n      alt=\"Narcotics Anonymous, Anonyma Narkomaner\"\n      class=\"footer-logo\"\n    >\n  </footer>",
  init: function initManualPage() {
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";
    
        const ADMIN_PASSWORD = atob("cmVnZ2E=");
    
        const supabaseClient = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_KEY
        );
    
        const loginCard = document.getElementById("loginCard");
        const manualCard = document.getElementById("manualCard");
        const loginMessage = document.getElementById("loginMessage");
        const messageBox = document.getElementById("messageBox");
        const cleanDateInput = document.getElementById("cleanDate");
        const eventTitle = document.getElementById("eventTitle");
        const manualHistoryList = document.getElementById("manualHistoryList");
        const eventSelect = document.getElementById("eventSelect");
    
        let events = [];
        let selectedEventId = "";
        let selectedEvent = null;
        let registrationStatus = null;
        let registrationIsOpen = false;
        const MIN_CLEAN_YEAR = 1953;
    
        function showMessage(element, text, type) {
          element.textContent = text;
          element.className = "message " + type;
        }
    
        function clearMessage(element) {
          element.textContent = "";
          element.className = "message";
        }
    
        function pluralize(value, singular, plural) {
          return value === 1 ? singular : plural;
        }
    
        function convertRawDate(rawDate) {
          return rawDate.substring(0,4) + "-" +
                 rawDate.substring(4,6) + "-" +
                 rawDate.substring(6,8);
        }
    
        function isValidDateString(cleanDate) {
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          const cleanYear = Number(cleanDate.substring(0, 4));
    
          if (Number.isNaN(selectedDate.getTime())) {
            return false;
          }
    
          if (cleanYear < MIN_CLEAN_YEAR) {
            return false;
          }
    
          return selectedDate <= today;
        }
    
        function isBeforeMinimumCleanYear(cleanDate) {
          return Number(cleanDate.substring(0, 4)) < MIN_CLEAN_YEAR;
        }
    
        function daysBetween(cleanDate) {
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          return Math.floor((today - selectedDate) / 86400000) + 1;
        }
    
        function formatDetailFromDays(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const years = Math.floor(totalDays / 365.25);
          const daysAfterYears = totalDays - Math.floor(years * 365.25);
    
          const averageMonthDays = 30.4375;
          const months = Math.floor(daysAfterYears / averageMonthDays);
          const remainingDays = Math.round(daysAfterYears - (months * averageMonthDays));
    
          let parts = [];
          if (years > 0) parts.push(years + " år");
          if (months > 0) parts.push(months + " " + pluralize(months, "månad", "månader"));
          if (remainingDays > 0 || parts.length === 0) {
            parts.push(remainingDays + " " + pluralize(remainingDays, "dag", "dagar"));
          }
    
          return parts.join(" ");
        }
    
        function sanitizeDateInput(input) {
          let value = input.value.replace(/\D/g, "");
          if (value.length > 8) value = value.substring(0, 8);
          input.value = value;
        }
    
        cleanDateInput.addEventListener("input", function () {
          sanitizeDateInput(this);
        });
    
        function updateSelectedEventInfo() {
          selectedEvent = events.find(event => event.id === selectedEventId) || null;
    
          if (!selectedEvent) {
            eventTitle.innerText = "EVENT SAKNAS";
            registrationIsOpen = false;
            return;
          }
    
          registrationStatus = selectedEvent.registration_status;
          registrationIsOpen = registrationStatus === "open";
    
          if (registrationStatus === "not_started") {
            eventTitle.innerText = "REGISTRERINGEN HAR INTE ÖPPNAT";
          } else if (registrationStatus === "closed") {
            eventTitle.innerText = "REGISTRERINGEN ÄR AVSLUTAD";
          } else {
            eventTitle.innerText = selectedEvent.name.toUpperCase();
          }
    
          document.title = "Manuell registrering - " + selectedEvent.name;
        }
    
    
        let editingManualId = null;
    
        async function loadManualHistory() {
          if (!selectedEventId || !manualHistoryList) return;
    
          const { data, error } = await supabaseClient
            .from("clean_time_entries")
            .select("id,clean_date,created_at")
            .eq("event_id", selectedEventId)
            .eq("created_by", "manual")
            .order("created_at", { ascending: false })
            .limit(20);
    
          if (error || !data || data.length === 0) {
            manualHistoryList.innerHTML = "Inga registreringar ännu.";
            return;
          }
    
          manualHistoryList.innerHTML = data.map(row => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #dbe3ef;">
              <div>
                  <div><strong>${row.clean_date}</strong></div>
                  <div style="font-size:12px;color:#64748b;">
                    ${new Date(row.created_at).toLocaleString("sv-SE")}
                  </div>
                </div>
              <div>
                <button type="button" onclick="editManualEntry('${row.id}','${row.clean_date}')" style="width:auto;padding:8px 12px;margin-right:6px;">✏️</button>
                <button type="button" onclick="deleteManualEntry('${row.id}')" style="width:auto;padding:8px 12px;background:#b91c1c;">🗑️</button>
              </div>
            </div>
          `).join("");
        }
    
        window.editManualEntry = function(id, cleanDate) {
          editingManualId = id;
          cleanDateInput.value = cleanDate.replaceAll("-", "");
          document.getElementById("submitButton").innerText = "Uppdatera registrering";
          cleanDateInput.focus();
        };
    
        window.deleteManualEntry = async function(id) {
          if (!confirm("Ta bort registreringen?")) return;
          await supabaseClient.from("clean_time_entries").delete().eq("id", id);
          await loadManualHistory();
        };
    
    
        async function loadEvents() {
          const { data, error } = await supabaseClient
            .from("event_status")
            .select("id,name,slug,is_active,start_date,end_date,registration_status")
            .eq("is_active", true)
            .order("name", { ascending: true });
    
          if (error) {
            eventTitle.innerText = "EVENT KUNDE INTE HÄMTAS";
            showMessage(messageBox, "Kunde inte hämta event: " + error.message, "error");
            console.log(error);
            return;
          }
    
          events = data || [];
    
          const params = new URLSearchParams(window.location.search);
          const eventSlug = params.get("event") || localStorage.getItem("selectedEventSlug");
    
          if (eventSlug) {
            const event = events.find(item => item.slug === eventSlug);
            if (event) {
              selectedEventId = event.id;
              localStorage.setItem("selectedEventSlug", event.slug);
            }
          }
    
          updateSelectedEventInfo();
          await loadManualHistory();
        }
    
        if (eventSelect) {
          eventSelect.addEventListener("change", async function () {
            selectedEventId = this.value;
            selectedEvent = events.find(event => event.id === selectedEventId) || null;
    
            if (selectedEvent) {
              localStorage.setItem("selectedEventSlug", selectedEvent.slug);
            }
    
            updateSelectedEventInfo();
            await loadManualHistory();
          });
        }
    
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
          e.preventDefault();
          clearMessage(loginMessage);
    
          const password = document.getElementById("adminPassword").value;
    
          if (password !== ADMIN_PASSWORD) {
            showMessage(loginMessage, "Fel lösenord.", "error");
            return;
          }
    
          loginCard.classList.add("hidden");
          manualCard.classList.remove("hidden");
    
          await loadEvents();
        });
    
        document.getElementById("manualForm").addEventListener("submit", async function(e) {
          e.preventDefault();
          clearMessage(messageBox);
          if (!selectedEventId) {
            showMessage(messageBox, "Välj ett event först.", "error");
            return;
          }
    
          if (!registrationIsOpen) {
            if (registrationStatus === "not_started") {
              showMessage(messageBox, "Registreringen har inte öppnat ännu.", "error");
            } else {
              showMessage(messageBox, "Registreringen är avslutad.", "error");
            }
            return;
          }
    
          const rawDate = cleanDateInput.value;
    
          if (rawDate.length !== 8) {
            showMessage(messageBox, "Ange datum som ÅÅÅÅMMDD.", "error");
            return;
          }
    
          const cleanDate = convertRawDate(rawDate);
    
          if (isBeforeMinimumCleanYear(cleanDate)) {
            showMessage(messageBox, "Årtalet måste vara 1953 eller senare.", "error");
            return;
          }
    
          if (!isValidDateString(cleanDate)) {
            showMessage(messageBox, "Datumet är ogiltigt eller ligger i framtiden.", "error");
            return;
          }
    
          const button = document.getElementById("submitButton");
          button.disabled = true;
          button.innerText = "Registrerar...";
    
          let error;
          let updatedEntry = null;
    
          if (editingManualId) {
            const updateResult = await supabaseClient
              .from("clean_time_entries")
              .update({
                clean_date: cleanDate,
                updated_at: new Date().toISOString()
              })
              .eq("id", editingManualId)
              .eq("event_id", selectedEventId)
              .eq("created_by", "manual")
              .select("id,clean_date,updated_at")
              .maybeSingle();
    
            error = updateResult.error;
            updatedEntry = updateResult.data;
    
            if (!error && !updatedEntry) {
              error = {
                message: "Ingen manuell registrering hittades att uppdatera. Ladda om sidan och försök igen."
              };
            }
          } else {
            ({ error } = await supabaseClient
              .from("clean_time_entries")
              .insert([{
                clean_date: cleanDate,
                event_id: selectedEventId,
                device_id: "manual-" + crypto.randomUUID(),
                created_by: "manual"
              }]));
          }
    
          button.disabled = false;
          button.innerText = "Registrera manuellt";
    
          if (error) {
            showMessage(messageBox, "Något gick fel: " + error.message, "error");
            console.log(error);
            return;
          }
    
          showMessage(messageBox,
            editingManualId ? "Registreringen är uppdaterad ❤️" : "Tiden är registrerad ❤️",
            "success");
          document.getElementById("manualForm").reset();
          editingManualId = null;
          button.innerText = "Registrera manuellt";
          await loadManualHistory();
        });
    
    if (typeof editManualEntry === "function") window.editManualEntry = editManualEntry;
    if (typeof deleteManualEntry === "function") window.deleteManualEntry = deleteManualEntry;
  }
});

  html: "<section class=\"hero\">\n    <h1>Drogfri tid - historik</h1>\n    <p>Arkiverade event och sparade slutresultat</p>\n  </section>\n\n  <main class=\"wrap\">\n\n    <section class=\"card\">\n      <h2>Välj arkiverat event</h2>\n      <p class=\"helper-text\">Hämta sparat slutresultat från historiken.</p>\n\n      <label for=\"historySelect\">Arkiverat event</label>\n      <select id=\"historySelect\">\n        <option value=\"\">Laddar historik...</option>\n      </select>\n\n      <div class=\"event-display-title\" id=\"selectedEventInfo\">Välj ett event</div>\n      <div id=\"messageBox\" class=\"message\"></div>\n\n      <a href=\"./\" class=\"back-button\">← Till huvudmenyn</a>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-value\" id=\"statsPersonCount\">0 personer</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Total tid</div>\n      <div class=\"stat-value\" id=\"statsTotalYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsTotalDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsTotalNote\">0 dagar totalt</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Medel</div>\n      <div class=\"stat-value\" id=\"statsAverageYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsAverageDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsAverageNote\">0 dagar i genomsnitt</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Längsta tid</div>\n      <div class=\"stat-value\" id=\"statsLongestYears\">0 år</div>\n      <div class=\"stat-detail\" id=\"statsLongestDetail\">(0 dagar)</div>\n      <div class=\"stat-note\" id=\"statsLongestNote\">0 dagar</div>\n    </section>\n\n    <section class=\"stat-card\">\n      <div class=\"stat-title\">Kortaste tid</div>\n      <div class=\"stat-value\" id=\"statsShortestYears\">0 dagar</div>\n      <div class=\"stat-detail\" id=\"statsShortestDetail\"></div>\n      <div class=\"stat-note\" id=\"statsShortestNote\">0 dagar</div>\n    </section>\n    <section class=\"card\">\n      <h2>Historik</h2>\n      <p class=\"helper-text\" id=\"historyMeta\">\n        Välj ett arkiverat event för att visa sparat slutresultat.\n      </p>\n    </section>\n\n    <section class=\"card\">\n      <h2>Hur räknas tiden?</h2>\n      <p class=\"helper-text\">\n        Denna sida visar sparad historik från arkiverade event.\n        När ett event arkiveras sparas slutresultatet i databasen.\n        Därefter hämtas antal personer, total tid, medelvärde, längsta tid och kortaste tid från historiktabellen.\n        I statistikrutorna räknas år som 365,25 dagar och en månad som cirka 30,44 dagar.\n      </p>\n    </section>\n\n  </main>\n\n  <div class=\"service-credit\">Denna webbapp är ett serviceverktyg utvecklat av NA Region Sveriges webbkommitté för Anonyma Narkomaner Sverige. Narcotics Anonymous® och NA-logotyper används inom NA:s servicestruktur.</div>\n<footer class=\"footer\">\n    <img\n      src=\"/assets/na-logo.png\"\n      alt=\"Narcotics Anonymous, Anonyma Narkomaner\"\n      class=\"footer-logo\"\n    >\n  </footer>",
  init: function initHistoryPage() {
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";
    
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
        const selectedEventInfo = document.getElementById("selectedEventInfo");
        const messageBox = document.getElementById("messageBox");
        const historySelect = document.getElementById("historySelect");
        const historyMeta = document.getElementById("historyMeta");
    
        let historyRows = [];
        let selectedHistory = null;
    
        function showError(text) {
          messageBox.textContent = text;
          messageBox.className = "message error";
        }
    
        function clearError() {
          messageBox.textContent = "";
          messageBox.className = "message";
        }
    
        function pluralize(value, singular, plural) {
          return value === 1 ? singular : plural;
        }
    
        function formatDate(value) {
          if (!value) return "-";
          const date = new Date(value + "T00:00:00");
          if (Number.isNaN(date.getTime())) return value;
          return date.toLocaleDateString("sv-SE");
        }
    
        function formatDateTime(value) {
          if (!value) return "-";
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return "-";
          return date.toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          });
        }
    
        function formatDetailFromDays(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const years = Math.floor(totalDays / 365.25);
          const daysAfterYears = totalDays - Math.floor(years * 365.25);
          const averageMonthDays = 30.4375;
          const months = Math.floor(daysAfterYears / averageMonthDays);
          const remainingDays = Math.round(daysAfterYears - (months * averageMonthDays));
    
          let parts = [];
          if (years > 0) parts.push(years + " år");
          if (months > 0) parts.push(months + " " + pluralize(months, "månad", "månader"));
          if (remainingDays > 0 || parts.length === 0) {
            parts.push(remainingDays + " " + pluralize(remainingDays, "dag", "dagar"));
          }
    
          return parts.join(" ");
        }
    
        function formatShortValue(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const averageMonthDays = 30.4375;
    
          if (totalDays < averageMonthDays) {
            return totalDays + " " + pluralize(totalDays, "dag", "dagar");
          }
    
          if (totalDays < 365.25) {
            const months = Math.floor(totalDays / averageMonthDays);
            const remainingDays = Math.round(totalDays - (months * averageMonthDays));
    
            let parts = [];
            if (months > 0) parts.push(months + " " + pluralize(months, "månad", "månader"));
            if (remainingDays > 0) parts.push(remainingDays + " " + pluralize(remainingDays, "dag", "dagar"));
    
            return parts.join(" ");
          }
    
          return null;
        }
    
        function formatStatsFromDays(days) {
          const totalDays = Math.max(0, Math.floor(Number(days) || 0));
          const decimalYears = (totalDays / 365.25).toFixed(1).replace(".", ",");
    
          return {
            yearsDecimal: decimalYears + " år",
            detail: "(" + formatDetailFromDays(totalDays) + ")",
            daysText: totalDays.toLocaleString("sv-SE") + " " + pluralize(totalDays, "dag", "dagar")
          };
        }
    
        function resetTopStats() {
          const zero = formatStatsFromDays(0);
    
          document.getElementById("statsPersonCount").innerText = "0 personer";
          document.getElementById("statsTotalYears").innerText = zero.yearsDecimal;
          document.getElementById("statsTotalDetail").innerText = zero.detail;
          document.getElementById("statsTotalNote").innerText = zero.daysText + " totalt";
          document.getElementById("statsAverageYears").innerText = zero.yearsDecimal;
          document.getElementById("statsAverageDetail").innerText = zero.detail;
          document.getElementById("statsAverageNote").innerText = zero.daysText + " i genomsnitt";
          document.getElementById("statsLongestYears").innerText = zero.yearsDecimal;
          document.getElementById("statsLongestDetail").innerText = zero.detail;
          document.getElementById("statsLongestNote").innerText = zero.daysText;
          document.getElementById("statsShortestYears").innerText = "0 dagar";
          document.getElementById("statsShortestDetail").innerText = "";
          document.getElementById("statsShortestNote").innerText = zero.daysText;
        }
    
        function updateTopStatsFromHistory(row) {
          if (!row) {
            resetTopStats();
            return;
          }
    
          const personCount = Number(row.person_count || 0);
          const totalDays = Number(row.total_days || 0);
          const averageDays = Math.floor(Number(row.average_days || 0));
          const longestDays = Number(row.longest_days || 0);
          const shortestDays = Number(row.shortest_days || 0);
    
          const total = formatStatsFromDays(totalDays);
          const average = formatStatsFromDays(averageDays);
          const longest = formatStatsFromDays(longestDays);
          const shortest = formatStatsFromDays(shortestDays);
          const shortestShortValue = formatShortValue(shortestDays);
    
          document.getElementById("statsPersonCount").innerText =
            personCount.toLocaleString("sv-SE") + " " + pluralize(personCount, "person", "personer");
    
          document.getElementById("statsTotalYears").innerText = total.yearsDecimal;
          document.getElementById("statsTotalDetail").innerText = total.detail;
          document.getElementById("statsTotalNote").innerText = total.daysText + " totalt";
    
          document.getElementById("statsAverageYears").innerText = average.yearsDecimal;
          document.getElementById("statsAverageDetail").innerText = average.detail;
          document.getElementById("statsAverageNote").innerText = average.daysText + " i genomsnitt";
    
          document.getElementById("statsLongestYears").innerText = longest.yearsDecimal;
          document.getElementById("statsLongestDetail").innerText = longest.detail;
          document.getElementById("statsLongestNote").innerText = longest.daysText;
    
          if (shortestShortValue !== null) {
            document.getElementById("statsShortestYears").innerText = shortestShortValue;
            document.getElementById("statsShortestDetail").innerText = "";
          } else {
            document.getElementById("statsShortestYears").innerText = shortest.yearsDecimal;
            document.getElementById("statsShortestDetail").innerText = shortest.detail;
          }
    
          document.getElementById("statsShortestNote").innerText = shortest.daysText;
        }
    
        async function loadHistory() {
          clearError();
    
          const { data, error } = await supabaseClient
            .from("event_history")
            .select("id,event_id,event_name,event_slug,start_date,end_date,person_count,total_days,average_days,longest_days,shortest_days,archived_at")
            .order("archived_at", { ascending: false });
    
          if (error) {
            historySelect.innerHTML = '<option value="">Kunde inte hämta historik</option>';
            selectedEventInfo.innerText = "HISTORIK KUNDE INTE HÄMTAS";
            showError("Kunde inte hämta historik: " + error.message);
            resetTopStats();
            return;
          }
    
          historyRows = data || [];
    
          if (historyRows.length === 0) {
            historySelect.innerHTML = '<option value="">Ingen historik finns</option>';
            selectedEventInfo.innerText = "INGEN HISTORIK";
            historyMeta.innerText = "Inga arkiverade event finns ännu.";
            resetTopStats();
            return;
          }
    
          historySelect.innerHTML =
            '<option value="">Välj arkiverat event...</option>' +
            historyRows.map(row => {
              const period = row.start_date && row.end_date
                ? " " + row.start_date + "–" + row.end_date
                : "";
              return `<option value="${row.id}">${row.event_name}${period}</option>`;
            }).join("");
    
          const params = new URLSearchParams(window.location.search);
          const historyId = params.get("history");
          if (historyId && historyRows.some(row => row.id === historyId)) {
            historySelect.value = historyId;
            selectHistory(historyId);
          } else {
            historySelect.value = historyRows[0].id;
            selectHistory(historyRows[0].id);
          }
        }
    
        function selectHistory(id) {
          clearError();
    
          selectedHistory = historyRows.find(row => row.id === id) || null;
    
          if (!selectedHistory) {
            selectedEventInfo.innerText = "VÄLJ ETT EVENT";
            historyMeta.innerText = "Välj ett arkiverat event för att visa sparat slutresultat.";
            resetTopStats();
            return;
          }
    
          selectedEventInfo.innerText = selectedHistory.event_name || "ARKIVERAT EVENT";
          document.title = "Historik - " + (selectedHistory.event_name || "Drogfri tid");
    
          historyMeta.innerHTML =
            "<strong>Event-ID:</strong> " + (selectedHistory.event_slug || "-") + "<br>" +
            "<strong>Startdatum:</strong> " + formatDate(selectedHistory.start_date) + "<br>" +
            "<strong>Slutdatum:</strong> " + formatDate(selectedHistory.end_date) + "<br>" +
            "<strong>Arkiverat:</strong> " + formatDateTime(selectedHistory.archived_at);
    
          updateTopStatsFromHistory(selectedHistory);
        }
    
        historySelect.addEventListener("change", function () {
          selectHistory(this.value);
        });
    
        loadHistory();
  }
});

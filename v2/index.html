  style: ":root {\n      --na-blue: #1E4F9A;\n      --na-blue-dark: #163D78;\n      --text: #1f2937;\n      --muted: #64748b;\n      --bg: #f4f7fb;\n      --white: #ffffff;\n      --border: #dbe3ef;\n      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);\n    }\n\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n\n    body {\n      font-family: \"Segoe UI\", Arial, sans-serif;\n      background: var(--bg);\n      color: var(--text);\n      min-height: 100vh;\n    }\n\n    .hero {\n      background: linear-gradient(135deg, var(--na-blue-dark), var(--na-blue));\n      color: white;\n      text-align: center;\n      padding: 42px 18px 75px;\n    }\n\n    .hero h1 {\n      font-size: clamp(22px, 5vw, 34px);\n      letter-spacing: 2px;\n      margin-bottom: 12px;\n      text-transform: uppercase;\n    }\n\n    .hero p { font-size: 16px; opacity: 0.92; }\n\n    .wrap {\n      width: min(100%, 620px);\n      margin: -45px auto 42px;\n      padding: 0 16px;\n      position: relative;\n      z-index: 10;\n    }\n\n    .card {\n      width: 100%;\n      background: var(--white);\n      border-radius: 22px;\n      box-shadow: var(--shadow);\n      border: 1px solid rgba(30, 79, 154, 0.08);\n      padding: 24px;\n      margin-bottom: 18px;\n    }\n\n    .card h2 {\n      color: var(--na-blue);\n      font-size: 22px;\n      margin-bottom: 10px;\n    }\n\n    .helper-text {\n      color: var(--muted);\n      line-height: 1.45;\n      margin-bottom: 18px;\n      font-size: 15px;\n    }\n\n    label {\n      display: block;\n      text-align: left;\n      color: var(--text);\n      font-weight: 700;\n      margin-bottom: 8px;\n    }\n\n    input[type=\"text\"],\n    input[type=\"password\"],\n    input[type=\"date\"],\n    select {\n      display: block;\n      width: calc(100% - 32px);\n      margin-left: auto;\n      margin-right: auto;\n      padding: 16px;\n      border-radius: 14px;\n      border: 1px solid var(--border);\n      font-size: 18px;\n      background: #fff;\n      color: var(--text);\n      margin-bottom: 14px;\n    }\n\n    button,\n    .back-button {\n      width: 100%;\n      background: var(--na-blue);\n      color: white;\n      border: none;\n      padding: 16px 22px;\n      border-radius: 14px;\n      cursor: pointer;\n      font-size: 17px;\n      font-weight: 750;\n      text-decoration: none;\n      text-align: center;\n      display: block;\n      margin-top: 12px;\n    }\n\n    .secondary-button,\n    .back-button { background: #64748b; }\n\n    .message {\n      display: none;\n      margin-top: 14px;\n      padding: 13px;\n      border-radius: 14px;\n      font-size: 15px;\n      line-height: 1.35;\n      text-align: center;\n    }\n\n    .message.success {\n      display: block;\n      background: #eef7ff;\n      color: var(--na-blue-dark);\n      border: 1px solid #cfe2ff;\n    }\n\n    .message.error {\n      display: block;\n      background: #fff1f2;\n      color: #9f1239;\n      border: 1px solid #fecdd3;\n    }\n\n    .hidden { display: none; }\n\n    .event-title {\n      text-align: center;\n      color: var(--na-blue);\n      font-size: clamp(30px, 8vw, 48px);\n      font-weight: 900;\n      text-transform: uppercase;\n      line-height: 1.15;\n      margin-bottom: 14px;\n    }\n\n    .created-note {\n      text-align: center;\n      color: var(--muted);\n      font-size: 14px;\n      margin-bottom: 18px;\n    }\n\n    .link-row {\n      background: #eef7ff;\n      border: 1px solid #cfe2ff;\n      border-radius: 16px;\n      padding: 14px;\n      margin-bottom: 12px;\n    }\n\n    .link-label {\n      color: var(--na-blue-dark);\n      font-weight: 800;\n      margin-bottom: 7px;\n    }\n\n    .link-line {\n      display: grid;\n      grid-template-columns: 1fr 44px;\n      gap: 8px;\n      align-items: center;\n    }\n\n    .link-url {\n      color: var(--na-blue-dark);\n      font-size: 14px;\n      word-break: break-all;\n      line-height: 1.35;\n    }\n\n    .link-url a {\n      color: var(--na-blue-dark);\n      text-decoration: none;\n    }\n\n    .copy-icon-button {\n      width: 44px;\n      height: 44px;\n      min-width: 44px;\n      padding: 0;\n      border-radius: 12px;\n      background: var(--na-blue);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      margin-top: 0;\n    }\n\n    .copy-icon-button svg {\n      width: 23px;\n      height: 23px;\n      stroke: white;\n      stroke-width: 2.4;\n      fill: none;\n    }\n\n    .qr-grid {\n      display: grid;\n      grid-template-columns: 1fr;\n      gap: 16px;\n    }\n\n    .qr-box {\n      background: #f8fafc;\n      border: 1px solid var(--border);\n      border-radius: 18px;\n      padding: 18px;\n      text-align: center;\n    }\n\n    .qr-title {\n      color: var(--na-blue);\n      font-weight: 850;\n      font-size: 18px;\n      margin-bottom: 12px;\n    }\n\n    .qr-holder {\n      display: flex;\n      justify-content: center;\n      align-items: center;\n      min-height: 196px;\n      margin-bottom: 12px;\n    }\n\n    .flyer-actions {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 12px;\n      margin-top: 12px;\n    }\n\n    .preview-flyer {\n      background: white;\n      border: 1px solid var(--border);\n      border-radius: 18px;\n      padding: 22px;\n      text-align: center;\n      margin-top: 16px;\n    }\n\n    .preview-title {\n      color: var(--na-blue);\n      font-weight: 900;\n      font-size: 34px;\n      text-transform: uppercase;\n      line-height: 1.15;\n      margin-bottom: 18px;\n    }\n\n    .preview-text {\n      color: var(--text);\n      font-weight: 800;\n      font-size: 22px;\n      line-height: 1.25;\n      margin-bottom: 18px;\n    }\n\n    .preview-help {\n      color: var(--text);\n      font-size: 16px;\n      line-height: 1.35;\n      margin-top: 18px;\n    }\n\n    .footer {\n      text-align: center;\n      color: var(--muted);\n      padding: 0 16px 34px;\n      font-size: 15px;\n    }\n\n    .footer-logo {\n      display: block;\n      width: min(100%, 360px);\n      max-width: 360px;\n      height: auto;\n      margin: 0 auto;\n    }\n\n    @media (max-width: 430px) {\n      .wrap { padding: 0 12px; }\n      .card { border-radius: 18px; padding: 19px; }\n      .flyer-actions { grid-template-columns: 1fr; }\n\n      .footer-logo {\n        width: min(88vw, 310px);\n      }\n    }",
  html: "<section class=\"hero\">\n    <h1>Skapa event</h1>\n    <p>Länkar, QR-koder och flyer</p>\n  </section>\n\n  <main class=\"wrap\">\n\n    <section class=\"card\" id=\"loginCard\">\n      <h2>Logga in</h2>\n      <p class=\"helper-text\">Ange lösenord för att skapa event.</p>\n\n      <label for=\"adminPassword\">Lösenord</label>\n      <input type=\"password\" id=\"adminPassword\" placeholder=\"Lösenord\" autocomplete=\"current-password\">\n      <button type=\"button\" id=\"loginButton\">Logga in</button>\n      <a href=\"./\" class=\"back-button\">← Till huvudmenyn</a>\n\n      <div id=\"loginMessage\" class=\"message\"></div>\n    </section>\n\n    <section class=\"card hidden\" id=\"createCard\">\n      <h2>Event</h2>\n      <p class=\"helper-text\">Skapa event och få färdiga länkar, QR-koder och flyer.</p>\n\n      <label for=\"eventName\">Eventnamn</label>\n      <input type=\"text\" id=\"eventName\" placeholder=\"Exempelvis Gullbranna 2027\">\n\n      <label for=\"eventSlug\">Event-ID / slug</label>\n      <input type=\"text\" id=\"eventSlug\" placeholder=\"exempelvis gullbranna-2027\">\n\n      <label for=\"startDate\">Startdatum</label>\n      <input type=\"date\" id=\"startDate\">\n\n      <label for=\"endDate\">Slutdatum</label>\n      <input type=\"date\" id=\"endDate\">\n\n      <button type=\"button\" id=\"createEventButton\">Skapa event</button>\n\n      <a href=\"./\" class=\"back-button\">← Till huvudmenyn</a>\n\n      <div id=\"eventMessage\" class=\"message\"></div>\n    </section>\n\n    <section class=\"card hidden\" id=\"existingEventCard\">\n      <h2>Befintliga event</h2>\n      <p class=\"helper-text\">Välj ett redan skapat event för att få länkar, QR-koder och flyer.</p>\n\n      <label for=\"eventSelect\">Välj event</label>\n      <select id=\"eventSelect\">\n        <option value=\"\">Laddar event...</option>\n      </select>\n\n      <button type=\"button\" class=\"secondary-button\" id=\"loadSelectedEventButton\">\n        Hämta länkar, QR och flyer\n      </button>\n\n      <div id=\"existingEventMessage\" class=\"message\"></div>\n    </section>\n\n    <section class=\"card hidden\" id=\"resultCard\">\n      <div class=\"event-title\" id=\"createdEventTitle\">EVENT</div>\n      <div class=\"created-note\" id=\"createdEventSlug\">Event-ID</div>\n\n      <div class=\"link-row\">\n        <div class=\"link-label\">Registreringslänk</div>\n        <div class=\"link-line\">\n          <div class=\"link-url\" id=\"registerUrl\"></div>\n          <button type=\"button\" class=\"copy-icon-button\" data-copy=\"registerUrl\">\n            <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <rect x=\"8\" y=\"8\" width=\"12\" height=\"12\" rx=\"2\"></rect>\n              <path d=\"M4 16V6a2 2 0 0 1 2-2h10\"></path>\n            </svg>\n          </button>\n        </div>\n      </div>\n\n      <div class=\"link-row\">\n        <div class=\"link-label\">Totalsida</div>\n        <div class=\"link-line\">\n          <div class=\"link-url\" id=\"totalUrl\"></div>\n          <button type=\"button\" class=\"copy-icon-button\" data-copy=\"totalUrl\">\n            <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <rect x=\"8\" y=\"8\" width=\"12\" height=\"12\" rx=\"2\"></rect>\n              <path d=\"M4 16V6a2 2 0 0 1 2-2h10\"></path>\n            </svg>\n          </button>\n        </div>\n      </div>\n\n      <div class=\"link-row\">\n        <div class=\"link-label\">Statistik</div>\n        <div class=\"link-line\">\n          <div class=\"link-url\" id=\"statisticsUrl\"></div>\n          <button type=\"button\" class=\"copy-icon-button\" data-copy=\"statisticsUrl\">\n            <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <rect x=\"8\" y=\"8\" width=\"12\" height=\"12\" rx=\"2\"></rect>\n              <path d=\"M4 16V6a2 2 0 0 1 2-2h10\"></path>\n            </svg>\n          </button>\n        </div>\n      </div>\n    </section>\n\n    <section class=\"card hidden\" id=\"qrCard\">\n      <h2>QR-koder</h2>\n      <p class=\"helper-text\">QR-koden för registrering används även i flyern.</p>\n\n      <div class=\"qr-grid\">\n        <div class=\"qr-box\">\n          <div class=\"qr-title\">Registrering</div>\n          <div class=\"qr-holder\" id=\"qrRegister\"></div>\n        </div>\n\n        <div class=\"qr-box\">\n          <div class=\"qr-title\">Total</div>\n          <div class=\"qr-holder\" id=\"qrTotal\"></div>\n        </div>\n\n        <div class=\"qr-box\">\n          <div class=\"qr-title\">Statistik</div>\n          <div class=\"qr-holder\" id=\"qrStatistics\"></div>\n        </div>\n      </div>\n    </section>\n\n    <section class=\"card hidden\" id=\"flyerCard\">\n      <h2>Flyer</h2>\n      <p class=\"helper-text\">Skapa en A4-PDF med eventnamn, text och stor QR-kod.</p>\n\n      <div class=\"flyer-actions\">\n        <button type=\"button\" id=\"flyerSvButton\">Skapa svensk PDF</button>\n        <button type=\"button\" id=\"flyerEnButton\" class=\"secondary-button\">Create English PDF</button>\n      </div>\n\n      <div class=\"preview-flyer\">\n        <div class=\"preview-title\" id=\"previewTitle\">EVENT</div>\n        <div class=\"preview-text\">Registrera din drogfri tid här</div>\n        <div class=\"qr-holder\" id=\"qrPreview\"></div>\n        <div class=\"preview-help\">Behöver du hjälp? Prata med registreringen.</div>\n      </div>\n    </section>\n\n  </main>\n\n  <div class=\"service-credit\">Denna webbapp är ett serviceverktyg utvecklat av NA Region Sveriges webbkommitté för Anonyma Narkomaner Sverige. Narcotics Anonymous® och NA-logotyper används inom NA:s servicestruktur.</div>\n<footer class=\"footer\">\n    <img src=\"/assets/na-logo.png\" alt=\"Narcotics Anonymous, Anonyma Narkomaner\" class=\"footer-logo\">\n  </footer>\n\n  <img id=\"naLogoPdf\" src=\"/assets/na-logo.png\" style=\"display:none\" crossorigin=\"anonymous\">",
  init: function initCreatePage() {
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";
        const ADMIN_PASSWORD = atob("c2thcGE=");
    
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
        let currentEvent = null;
        let currentLinks = null;
        let events = [];
    
        const loginCard = document.getElementById("loginCard");
        const createCard = document.getElementById("createCard");
        const existingEventCard = document.getElementById("existingEventCard");
        const resultCard = document.getElementById("resultCard");
        const qrCard = document.getElementById("qrCard");
        const flyerCard = document.getElementById("flyerCard");
    
        const loginMessage = document.getElementById("loginMessage");
        const eventMessage = document.getElementById("eventMessage");
        const existingEventMessage = document.getElementById("existingEventMessage");
        const eventSelect = document.getElementById("eventSelect");
    
        function showMessage(element, text, type) {
          element.textContent = text;
          element.className = "message " + type;
        }
    
        function clearMessage(element) {
          element.textContent = "";
          element.className = "message";
        }
    
        function sanitizeSlug(value) {
          return value
            .toLowerCase()
            .trim()
            .replace(/å/g, "a")
            .replace(/ä/g, "a")
            .replace(/ö/g, "o")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
        }
    
        function doLogin() {
          clearMessage(loginMessage);
    
          const password = document.getElementById("adminPassword").value;
    
          if (password !== ADMIN_PASSWORD) {
            showMessage(loginMessage, "Fel lösenord.", "error");
            return;
          }
    
          loginCard.classList.add("hidden");
          createCard.classList.remove("hidden");
          existingEventCard.classList.remove("hidden");
          loadExistingEvents();
        }
    
        document.getElementById("loginButton").addEventListener("click", doLogin);
        document.getElementById("adminPassword").addEventListener("keydown", function(event) {
          if (event.key === "Enter") {
            event.preventDefault();
            doLogin();
          }
        });
    
        document.getElementById("eventName").addEventListener("input", function () {
          const slugInput = document.getElementById("eventSlug");
          if (!slugInput.dataset.manual) {
            slugInput.value = sanitizeSlug(this.value);
          }
        });
    
        document.getElementById("eventSlug").addEventListener("input", function () {
          this.dataset.manual = "true";
          this.value = sanitizeSlug(this.value);
        });
    
        async function loadExistingEvents() {
          clearMessage(existingEventMessage);
    
          const { data, error } = await supabaseClient
            .from("events")
            .select("id,name,slug,is_active,start_date,end_date,created_at")
            .eq("is_active", true)
            .order("created_at", { ascending: false });
    
          if (error) {
            eventSelect.innerHTML = '<option value="">Kunde inte hämta event</option>';
            showMessage(existingEventMessage, "Kunde inte hämta event: " + error.message, "error");
            console.log(error);
            return;
          }
    
          events = data || [];
    
          if (events.length === 0) {
            eventSelect.innerHTML = '<option value="">Inga event finns</option>';
            return;
          }
    
          eventSelect.innerHTML =
            '<option value="">Välj event...</option>' +
            events.map(event => `<option value="${event.id}">${event.name} (${event.slug})</option>`).join("");
        }
    
        async function createEvent() {
          clearMessage(eventMessage);
    
          const name = document.getElementById("eventName").value.trim();
          const slug = sanitizeSlug(document.getElementById("eventSlug").value);
          const start_date = document.getElementById("startDate").value;
          const end_date = document.getElementById("endDate").value;
    
          if (!name || !slug || !start_date || !end_date) {
            showMessage(eventMessage, "Ange eventnamn, Event-ID, startdatum och slutdatum.", "error");
            return;
          }
    
          if (new Date(end_date + "T00:00:00") < new Date(start_date + "T00:00:00")) {
            showMessage(eventMessage, "Slutdatum måste vara samma dag eller efter startdatum.", "error");
            return;
          }
    
          const button = document.getElementById("createEventButton");
          button.disabled = true;
          button.innerText = "Skapar...";
    
          const { data, error } = await supabaseClient
            .from("events")
            .insert([{ name, slug, start_date, end_date, is_active: true }])
            .select("id,name,slug,start_date,end_date")
            .single();
    
          button.disabled = false;
          button.innerText = "Skapa event";
    
          if (error) {
            showMessage(eventMessage, "Kunde inte skapa event: " + error.message, "error");
            console.log(error);
            return;
          }
    
          currentEvent = data;
          buildEventAssets(currentEvent);
          await loadExistingEvents();
    
          document.getElementById("eventName").value = "";
          document.getElementById("eventSlug").value = "";
          document.getElementById("startDate").value = "";
          document.getElementById("endDate").value = "";
          document.getElementById("eventSlug").dataset.manual = "";
    
          showMessage(eventMessage, "Eventet är skapat.", "success");
          showAssetCards();
        }
    
        function loadSelectedExistingEvent() {
          clearMessage(existingEventMessage);
    
          const event = events.find(item => item.id === eventSelect.value);
    
          if (!event) {
            showMessage(existingEventMessage, "Välj ett event först.", "error");
            return;
          }
    
          currentEvent = event;
          buildEventAssets(currentEvent);
          showMessage(existingEventMessage, "Eventet är hämtat.", "success");
          showAssetCards();
        }
    
        function showAssetCards() {
          resultCard.classList.remove("hidden");
          qrCard.classList.remove("hidden");
          flyerCard.classList.remove("hidden");
          resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
        }
    
        document.getElementById("createEventButton").addEventListener("click", createEvent);
        document.getElementById("loadSelectedEventButton").addEventListener("click", loadSelectedExistingEvent);
    
        function buildEventAssets(event) {
          const registerUrl = window.CleanTime.routeUrl("register", { event: event.slug });
              const totalUrl = window.CleanTime.routeUrl("total", { event: event.slug });
              const statisticsUrl = window.CleanTime.routeUrl("statistics", { event: event.slug });
    
          currentLinks = { registerUrl, totalUrl, statisticsUrl };
    
          document.getElementById("createdEventTitle").innerText = event.name;
          document.getElementById("createdEventSlug").innerHTML =
            "Event-ID: " + event.slug +
            "<br>Startdatum: " + (event.start_date || "-") +
            "<br>Slutdatum: " + (event.end_date || "-");
    
          setLink("registerUrl", registerUrl);
          setLink("totalUrl", totalUrl);
          setLink("statisticsUrl", statisticsUrl);
    
          makeQr("qrRegister", registerUrl, 190);
          makeQr("qrTotal", totalUrl, 190);
          makeQr("qrStatistics", statisticsUrl, 190);
          makeQr("qrPreview", registerUrl, 210);
    
          document.getElementById("previewTitle").innerText = event.name;
        }
    
        function setLink(elementId, url) {
          document.getElementById(elementId).innerHTML =
            '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
        }
    
        function makeQr(elementId, url, size) {
          const element = document.getElementById(elementId);
          element.innerHTML = "";
    
          new QRCode(element, {
            text: url,
            width: size,
            height: size,
            correctLevel: QRCode.CorrectLevel.H
          });
        }
    
        async function copyText(elementId) {
          const element = document.getElementById(elementId);
          const link = element ? element.querySelector("a") : null;
          const text = link ? link.href : "";
    
          if (!text) return;
    
          try {
            await navigator.clipboard.writeText(text);
            showMessage(eventMessage, "Länk kopierad.", "success");
          } catch (error) {
            const input = document.createElement("input");
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            document.body.removeChild(input);
            showMessage(eventMessage, "Länk kopierad.", "success");
          }
        }
    
        document.querySelectorAll("[data-copy]").forEach(button => {
          button.addEventListener("click", function() {
            copyText(this.dataset.copy);
          });
        });
    
        function getQrDataUrl(elementId) {
          const element = document.getElementById(elementId);
          const canvas = element.querySelector("canvas");
    
          if (canvas) return canvas.toDataURL("image/png");
    
          const img = element.querySelector("img");
          return img ? img.src : null;
        }
    
        function safeFileName(value) {
          return sanitizeSlug(value || "event") || "event";
        }
    
        function createFlyer(language) {
          if (!currentEvent || !currentLinks) {
            showMessage(eventMessage, "Välj eller skapa ett event först.", "error");
            return;
          }
    
          const qrDataUrl = getQrDataUrl("qrPreview");
    
          if (!qrDataUrl) {
            showMessage(eventMessage, "QR-koden kunde inte hämtas.", "error");
            return;
          }
    
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    
          const isSv = language === "sv";
          const title = currentEvent.name.toUpperCase();
    
          const heading = isSv
            ? "Registrera din\ndrogfria tid här"
            : "Register your\nclean time here";
    
          const step1 = isSv
            ? "1. Scanna QR-koden"
            : "1. Scan the QR code";
    
          const step2 = isSv
            ? "2. Skriv in det datumet då du blev drogfri,\n    tex 20260205 (ÅÅÅÅMMDD)"
            : "2. Enter the date you became clean,\n    e.g. 20260205 (YYYYMMDD)";
    
          const infoText = isSv
            ? "Har du inte möjlighet att göra detta själv\nså prata med registreringen så hjälper dom till"
            : "If you are not able to do this yourself,\nplease talk to the registration team\nand they will help you";
    
          pdf.setFillColor(255, 255, 255);
          pdf.rect(0, 0, 210, 297, "F");
    
          pdf.setTextColor(30, 79, 154);
          pdf.setFont("helvetica", "bold");
          pdf.setFontSize(45);
          pdf.text(title, 105, 30, { align: "center", maxWidth: 185 });
    
          pdf.setDrawColor(30, 79, 154);
          pdf.setLineWidth(0.8);
          pdf.line(25, 55, 185, 55);
    
          pdf.setTextColor(31, 41, 55);
          pdf.setFont("helvetica", "bold");
          pdf.setFontSize(26);
          pdf.text(heading.split("\n"), 105, 68, { align: "center", lineHeightFactor: 1.2 });
    
          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(18);
          pdf.setTextColor(31, 41, 55);
          pdf.text(step1, 45, 95);
          pdf.text(step2.split("\n"), 45, 115, { lineHeightFactor: 1.3 });
    
          pdf.setTextColor(30, 79, 154);
          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(17);
          pdf.text(infoText.split("\n"), 105, 140, { align: "center", lineHeightFactor: 1.3 });
    
          pdf.addImage(qrDataUrl, "PNG", 67, 165, 76, 76);
    
          pdf.setDrawColor(30, 79, 154);
          pdf.setLineWidth(0.8);
          pdf.line(25, 250, 185, 250);
    
          const logo = document.getElementById("naLogoPdf");
    
          try {
            const logoWidth = 88;
            const logoHeight = 25;
    
            pdf.addImage(
              logo,
              "PNG",
              (210 - logoWidth) / 2,
              265,
              logoWidth,
              logoHeight
            );
          } catch (e) {
            console.log("Logga kunde inte läggas till i PDF", e);
          }
    
          pdf.save(safeFileName(currentEvent.slug) + "-flyer-" + (isSv ? "SV" : "EN") + ".pdf");
        }

  html: "<section class=\"hero\">\n    <h1>Admin</h1>\n    <p>Hantera event och drogfri tid</p>\n  </section>\n\n  <main class=\"wrap\">\n\n    <section class=\"card\" id=\"loginCard\">\n      <h2>Logga in</h2>\n      <p class=\"helper-text\">\n        Ange administratörslösenord.\n      </p>\n\n      <form id=\"loginForm\">\n        <label for=\"adminPassword\">Lösenord</label>\n        <input type=\"password\" id=\"adminPassword\" placeholder=\"Lösenord\" required />\n        <button type=\"submit\">Logga in</button>\n      </form>\n\n      <div id=\"loginMessage\" class=\"message\"></div>\n    </section>\n\n    <a href=\"./\" class=\"back-button hidden\" id=\"topHomeButton\">← Till huvudmenyn</a>\n    <section class=\"card hidden\" id=\"eventCard\">\n      <h2>Välj event</h2>\n\n      <p class=\"helper-text\">\n        Välj vilket event du vill arbeta med.\n      </p>\n\n      <div id=\"eventMessage\" class=\"message\"></div>\n\n      <label for=\"eventSelect\">Event</label>\n      <select id=\"eventSelect\">\n        <option value=\"\">Laddar event...</option>\n      </select>\n\n      <div class=\"selected-event\" id=\"selectedEventInfo\">\n        Inget event valt.\n      </div>\n\n      <div class=\"admin-actions\">\n        <button type=\"button\" class=\"secondary-button\" id=\"refreshEventsButton\">Uppdatera event</button>\n        <button type=\"button\" id=\"archiveSelectedEventButton\">Arkivera valt event</button>\n        <button type=\"button\" class=\"danger-button\" id=\"deleteSelectedEventButton\">Radera valt event</button>\n      </div>\n    </section>\n\n    <section class=\"card hidden\" id=\"listCard\">\n      <h2>Alla registreringar för valt event</h2>\n\n      <p class=\"helper-text\">\n        Här kan du redigera datum, ta bort registreringar och exportera listan för det event som är valt.\n      </p>\n\n      <div id=\"listMessage\" class=\"message\"></div>\n\n      <div class=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Datum</th>\n              <th>Dagar</th>\n              <th>Registrerad av</th>\n              <th>Skapad</th>\n              <th>Uppdaterad</th>\n              <th>Åtgärder</th>\n            </tr>\n          </thead>\n          <tbody id=\"entriesTableBody\">\n            <tr>\n              <td colspan=\"6\">Välj ett event för att läsa in listan.</td>\n            </tr>\n          </tbody>\n        </table>\n      </div>\n    </section>\n\n    <section class=\"card hidden\" id=\"exportCard\">\n      <h2>Export</h2>\n      <p class=\"helper-text\">\n        Exportera alla registreringar för valt event som CSV-fil.\n      </p>\n\n      <button type=\"button\" class=\"secondary-button\" id=\"exportButton\">Exportera CSV</button>\n    </section>\n\n  </main>\n\n  <div class=\"service-credit\">Denna webbapp är ett serviceverktyg utvecklat av NA Region Sveriges webbkommitté för Anonyma Narkomaner Sverige. Narcotics Anonymous® och NA-logotyper används inom NA:s servicestruktur.</div>\n<footer class=\"footer\">\n    <img\n      src=\"/assets/na-logo.png\"\n      alt=\"Narcotics Anonymous, Anonyma Narkomaner\"\n      class=\"footer-logo\"\n    >\n  </footer>",
  init: function initAdminPage() {
    const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";
    
        const ADMIN_PASSWORD = atob("YWRtaW4yMDI2");
    
        const supabaseClient = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_KEY
        );
    
        const loginCard = document.getElementById("loginCard");
        const eventCard = document.getElementById("eventCard");
        const listCard = document.getElementById("listCard");
        const exportCard = document.getElementById("exportCard");
    
        const loginMessage = document.getElementById("loginMessage");
        const eventMessage = document.getElementById("eventMessage");
        const listMessage = document.getElementById("listMessage");
    
        const entriesTableBody = document.getElementById("entriesTableBody");
        const eventSelect = document.getElementById("eventSelect");
        const selectedEventInfo = document.getElementById("selectedEventInfo");
    
        let entries = [];
        let events = [];
        let selectedEventId = "";
        let selectedEvent = null;
    
        function showMessage(element, text, type) {
          element.textContent = text;
          element.className = "message " + type;
        }
    
        function clearMessage(element) {
          element.textContent = "";
          element.className = "message";
        }
    
        function convertRawDate(rawDate) {
          return rawDate.substring(0,4) + "-" +
                 rawDate.substring(4,6) + "-" +
                 rawDate.substring(6,8);
        }
    
        function rawFromCleanDate(cleanDate) {
          return String(cleanDate || "").replaceAll("-", "");
        }
    
        function isValidDateString(cleanDate) {
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
          if (Number.isNaN(selectedDate.getTime())) {
            return false;
          }
    
          return selectedDate <= today;
        }
    
        function daysBetween(cleanDate) {
          const selectedDate = new Date(cleanDate + "T00:00:00");
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          return Math.floor((today - selectedDate) / 86400000) + 1;
        }
    
        function formatDateTime(value) {
          if (!value) return "-";
    
          const date = new Date(value);
    
          if (Number.isNaN(date.getTime())) {
            return "-";
          }
    
          return date.toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          });
        }
    
        function sanitizeDateInput(input) {
          let value = input.value.replace(/\D/g, "");
          if (value.length > 8) value = value.substring(0, 8);
          input.value = value;
        }
    
        function sanitizeSlug(value) {
          return value
            .toLowerCase()
            .trim()
            .replace(/å/g, "a")
            .replace(/ä/g, "a")
            .replace(/ö/g, "o")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
        }
    
        function pluralize(value, singular, plural) {
          return value === 1 ? singular : plural;
        }
    
        function requireSelectedEvent() {
          if (!selectedEventId) {
            showMessage(listMessage, "Välj ett event först.", "error");
            return false;
          }
          return true;
        }
    
        function updateSelectedEventInfo() {
          selectedEvent = events.find(event => event.id === selectedEventId) || null;
    
          if (!selectedEvent) {
            selectedEventInfo.innerHTML = "Inget event valt.";
            return;
          }
    
          selectedEventInfo.innerHTML = `
            <div><strong>Valt event:</strong> ${selectedEvent.name}</div>
            <div><strong>Event-ID:</strong> ${selectedEvent.slug}</div>
            <div><strong>Startdatum:</strong> ${selectedEvent.start_date || "-"}</div>
            <div><strong>Slutdatum:</strong> ${selectedEvent.end_date || "-"}</div>
          `;
        }
        async function loadEvents(keepSelection = true) {
          clearMessage(eventMessage);
    
          const previousSelection = selectedEventId;
    
          const { data, error } = await supabaseClient
            .from("events")
            .select("id,name,slug,is_active,start_date,end_date,created_at")
            .order("created_at", { ascending: false });
    
          if (error) {
            showMessage(eventMessage, "Kunde inte hämta event: " + error.message, "error");
            console.log(error);
            return;
          }
    
          events = data || [];
    
          eventSelect.innerHTML = '<option value="">Välj event...</option>' +
            events
              .filter(event => event.is_active !== false)
              .map(event => `<option value="${event.id}">${event.name} (${event.slug})</option>`)
              .join("");
    
          if (keepSelection && previousSelection && events.some(event => event.id === previousSelection)) {
            selectedEventId = previousSelection;
            eventSelect.value = selectedEventId;
          } else if (events.length > 0) {
            const firstActive = events.find(event => event.is_active !== false);
            selectedEventId = firstActive ? firstActive.id : "";
            eventSelect.value = selectedEventId;
          } else {
            selectedEventId = "";
          }
    
          updateSelectedEventInfo();
          await loadEntries();
        }
    
        async function deleteEvent(id) {
          const event = events.find(item => item.id === id);
    
          if (!event) return;
    
          const confirmation = prompt(
            "Detta raderar eventet och alla registreringar kopplade till eventet.\n\nEvent: " +
            event.name +
            "\n\nSkriv RADERA EVENT för att fortsätta."
          );
    
          if (confirmation !== "RADERA EVENT") {
            return;
          }
    
          const { error: entriesError } = await supabaseClient
            .from("clean_time_entries")
            .delete()
            .eq("event_id", id);
    
          if (entriesError) {
            showMessage(eventMessage, "Kunde inte radera registreringar för eventet: " + entriesError.message, "error");
            console.log(entriesError);
            return;
          }
    
          const { error } = await supabaseClient
            .from("events")
            .delete()
            .eq("id", id);
    
          if (error) {
            showMessage(eventMessage, "Kunde inte radera eventet: " + error.message, "error");
            console.log(error);
            return;
          }
    
          if (selectedEventId === id) {
            selectedEventId = "";
          }
    
          showMessage(eventMessage, "Eventet och dess registreringar är raderade.", "success");
          await loadEvents(false);
        }
    
        function renderEntries() {
          if (!selectedEventId) {
            entriesTableBody.innerHTML = `
              <tr>
                <td colspan="6">Välj ett event för att läsa in listan.</td>
              </tr>
            `;
            return;
          }
    
          if (entries.length === 0) {
            entriesTableBody.innerHTML = `
              <tr>
                <td colspan="6">Inga registreringar finns för valt event.</td>
              </tr>
            `;
            return;
          }
    
          entriesTableBody.innerHTML = entries.map(entry => {
            const days = Number(entry.clean_days || 0);
            const rawDate = rawFromCleanDate(entry.clean_date);
            const createdBy = entry.created_by || "user";
    
            return `
              <tr>
                <td>
                  <input
                    type="text"
                    class="edit-input"
                    id="edit-${entry.id}"
                    value="${rawDate}"
                    inputmode="numeric"
                    maxlength="8"
                  />
                </td>
                <td>${days.toLocaleString("sv-SE")}</td>
                <td>${createdBy}</td>
                <td>${formatDateTime(entry.created_at)}</td>
                <td>${formatDateTime(entry.updated_at)}</td>
                <td>
                  <div class="row-actions">
                    <button type="button" class="small-button" onclick="saveEdit('${entry.id}')">Spara</button>
                    <button type="button" class="small-button danger-button" onclick="deleteEntry('${entry.id}')">Ta bort</button>
                  </div>
                </td>
              </tr>
            `;
          }).join("");
    
          entries.forEach(entry => {
            const input = document.getElementById("edit-" + entry.id);
            if (input) {
              input.addEventListener("input", function () {
                sanitizeDateInput(this);
              });
            }
          });
    
        }
    
        async function loadEntries() {
          clearMessage(listMessage);
    
          if (!selectedEventId) {
            entries = [];
            renderEntries();
            return;
          }
    
          const { data, error } = await supabaseClient
            .from("clean_time_stats")
            .select("id, clean_date, clean_days, created_at, updated_at, created_by, device_id, event_id, is_active")
            .eq("event_id", selectedEventId)
            .eq("is_active", true)
            .order("clean_date", { ascending: true });
    
          if (error) {
            showMessage(listMessage, "Kunde inte hämta listan: " + error.message, "error");
            console.log(error);
            return;
          }
    
          entries = data || [];
          renderEntries();
        }
    
        async function saveEdit(id) {
          clearMessage(listMessage);
    
          if (!requireSelectedEvent()) return;
    
          const input = document.getElementById("edit-" + id);
          const rawDate = input ? input.value : "";
    
          if (rawDate.length !== 8) {
            showMessage(listMessage, "Ange datum som ÅÅÅÅMMDD innan du sparar.", "error");
            return;
          }
    
          const cleanDate = convertRawDate(rawDate);
    
          if (!isValidDateString(cleanDate)) {
            showMessage(listMessage, "Datumet är ogiltigt eller ligger i framtiden.", "error");
            return;
          }
    
          const { error } = await supabaseClient
            .from("clean_time_entries")
            .update({ clean_date: cleanDate, updated_at: new Date().toISOString() })
            .eq("id", id)
            .eq("event_id", selectedEventId);
    
          if (error) {
            showMessage(listMessage, "Kunde inte spara ändringen: " + error.message, "error");
            console.log(error);
            return;
          }
    
          showMessage(listMessage, "Registreringen är uppdaterad.", "success");
          await loadEntries();
        }
    
        async function deleteEntry(id) {
          clearMessage(listMessage);
    
          if (!requireSelectedEvent()) return;
    
          const confirmed = confirm("Är du säker på att du vill ta bort denna registrering?");
    
          if (!confirmed) {
            return;
          }
    
          const { error } = await supabaseClient
            .from("clean_time_entries")
            .delete()
            .eq("id", id)
            .eq("event_id", selectedEventId);
    
          if (error) {
            showMessage(listMessage, "Kunde inte ta bort registreringen: " + error.message, "error");
            console.log(error);
            return;
          }
    
          showMessage(listMessage, "Registreringen är borttagen.", "success");
          await loadEntries();
        }
    
        function exportToExcel() {
          if (!selectedEventId) {
            showMessage(listMessage, "Välj ett event först.", "error");
            return;
          }
    
          if (entries.length === 0) {
            showMessage(listMessage, "Det finns inget att exportera.", "error");
            return;
          }
    
          const header = [
            "Event",
            "Event-ID",
            "Datum",
            "Dagar",
            "Registrerad av",
            "Skapad",
            "Uppdaterad",
            "ID",
            "Device ID"
          ];
    
          const rows = entries.map(entry => [
            selectedEvent?.name || "",
            selectedEvent?.slug || "",
            entry.clean_date,
            Number(entry.clean_days || 0),
            entry.created_by || "user",
            formatDateTime(entry.created_at),
            formatDateTime(entry.updated_at),
            entry.id,
            entry.device_id || ""
          ]);
    
          const csv = [header, ...rows]
            .map(row => row.map(value => {
              const text = String(value ?? "");
              return '"' + text.replaceAll('"', '""') + '"';
            }).join(";"))
            .join("\n");
    
          const blob = new Blob(["\ufeff" + csv], {
            type: "text/csv;charset=utf-8;"
          });
    
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          const today = new Date().toISOString().slice(0, 10);
          const slug = selectedEvent?.slug || "event";
    
          link.href = url;
          link.download = "drogfri_tid_" + slug + "_" + today + ".csv";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
    
          URL.revokeObjectURL(url);
        }
    
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
          e.preventDefault();
          clearMessage(loginMessage);
    
          const password = document.getElementById("adminPassword").value;
    
          if (password !== ADMIN_PASSWORD) {
            showMessage(loginMessage, "Fel lösenord.", "error");
            return;
          }
    
          loginCard.classList.add("hidden");
          document.getElementById("topHomeButton").classList.remove("hidden");
          eventCard.classList.remove("hidden");
          listCard.classList.remove("hidden");
          exportCard.classList.remove("hidden");
    
          await loadEvents();
        });
    
        async function archiveSelectedEvent() {
          if (!selectedEventId || !selectedEvent) {
            showMessage(eventMessage, "Välj ett event först.", "error");
            return;
          }
    
          const confirmation = prompt(
            "Detta arkiverar eventet, sparar slutresultatet i historik och raderar alla registreringar kopplade till eventet.\n\nEvent: " +
            selectedEvent.name +
            "\n\nSkriv ARKIVERA EVENT för att fortsätta."
          );
    
          if (confirmation !== "ARKIVERA EVENT") {
            return;
          }
    
          clearMessage(eventMessage);
    
          const { data: summaryData, error: summaryError } = await supabaseClient
            .from("clean_time_summary_by_event")
            .select("event_id,event_name,event_slug,person_count,total_days,average_days,longest_days,shortest_days")
            .eq("event_id", selectedEventId)
            .limit(1);
    
          if (summaryError) {
            showMessage(eventMessage, "Kunde inte hämta sammanfattning för arkivering: " + summaryError.message, "error");
            console.log(summaryError);
            return;
          }
    
          const summary = summaryData && summaryData.length > 0 ? summaryData[0] : {
            event_id: selectedEventId,
            event_name: selectedEvent.name,
            event_slug: selectedEvent.slug,
            person_count: 0,
            total_days: 0,
            average_days: 0,
            longest_days: 0,
            shortest_days: 0
          };
    
          const historyRow = {
            event_id: selectedEventId,
            event_name: summary.event_name || selectedEvent.name,
            event_slug: summary.event_slug || selectedEvent.slug,
            start_date: selectedEvent.start_date || null,
            end_date: selectedEvent.end_date || null,
            person_count: Number(summary.person_count || 0),
            total_days: Number(summary.total_days || 0),
            average_days: Number(summary.average_days || 0),
            longest_days: Number(summary.longest_days || 0),
            shortest_days: Number(summary.shortest_days || 0)
          };
    
          const { error: historyError } = await supabaseClient
            .from("event_history")
            .insert([historyRow]);
    
          if (historyError) {
            showMessage(eventMessage, "Kunde inte spara historik: " + historyError.message, "error");
            console.log(historyError);
            return;
          }
    
          const { error: entriesError } = await supabaseClient
            .from("clean_time_entries")
            .delete()
            .eq("event_id", selectedEventId);
    
          if (entriesError) {
            showMessage(eventMessage, "Historik sparad, men kunde inte radera registreringar: " + entriesError.message, "error");
            console.log(entriesError);
            return;
          }
    
          const { error: eventError } = await supabaseClient
            .from("events")
            .delete()
            .eq("id", selectedEventId);
    
          if (eventError) {
            showMessage(eventMessage, "Historik och registreringar är sparade/raderade, men kunde inte radera eventet: " + eventError.message, "error");
            console.log(eventError);
            return;
          }
    
          selectedEventId = "";
          selectedEvent = null;
          entries = [];
    
          entriesTableBody.innerHTML = `
            <tr>
              <td colspan="6">Välj ett event för att läsa in listan.</td>
            </tr>
          `;
    
          showMessage(eventMessage, "Eventet är arkiverat. Slutresultatet är sparat i historiken.", "success");
          await loadEvents(false);
        }
    
        async function deleteSelectedEvent() {
          if (!selectedEventId || !selectedEvent) {
            showMessage(eventMessage, "Välj ett event först.", "error");
            return;
          }
    
          await deleteEvent(selectedEventId);
        }
    
        eventSelect.addEventListener("change", async function () {
          selectedEventId = this.value;
          updateSelectedEventInfo();
          await loadEntries();
        });
    
        document.getElementById("refreshEventsButton").addEventListener("click", () => loadEvents(true));
        document.getElementById("archiveSelectedEventButton").addEventListener("click", archiveSelectedEvent);
        document.getElementById("deleteSelectedEventButton").addEventListener("click", deleteSelectedEvent);
        document.getElementById("exportButton").addEventListener("click", exportToExcel);
    
    if (typeof saveEdit === "function") window.saveEdit = saveEdit;
    if (typeof deleteEntry === "function") window.deleteEntry = deleteEntry;
  }
});

ton:hover {\n      background: var(--blue-soft);\n    }\n\n    .notice {\n      background: #fff7ed;\n      border: 1px solid #fed7aa;\n      color: #7c2d12;\n      border-radius: 8px;\n      padding: 14px 16px;\n      margin-bottom: 22px;\n    }\n\n    .layout {\n      display: grid;\n      grid-template-columns: 260px 1fr;\n      gap: 20px;\n      align-items: start;\n    }\n\n    nav {\n      position: sticky;\n      top: 16px;\n      background: var(--panel);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      padding: 14px;\n      box-shadow: var(--shadow);\n    }\n\n    nav h2 {\n      margin: 0 0 8px;\n      font-size: 1rem;\n    }\n\n    nav a {\n      display: block;\n      color: var(--blue);\n      text-decoration: none;\n      font-weight: 650;\n      padding: 7px 8px;\n      border-radius: 6px;\n      font-size: .95rem;\n    }\n\n    nav a:hover {\n      background: var(--blue-soft);\n    }\n\n    main {\n      display: grid;\n      gap: 18px;\n    }\n\n    section {\n      background: var(--panel);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      padding: 22px;\n      box-shadow: var(--shadow);\n      scroll-margin-top: 18px;\n    }\n\n    section h2 {\n      margin: 0 0 6px;\n      font-size: 1.34rem;\n    }\n\n    .date {\n      margin: 0 0 16px;\n      color: var(--muted);\n      font-weight: 650;\n    }\n\n    .cols {\n      display: grid;\n      grid-template-columns: repeat(3, minmax(0, 1fr));\n      gap: 12px;\n    }\n\n    .box {\n      border: 1px solid #e5edf7;\n      border-radius: 8px;\n      padding: 13px 14px;\n      background: #fbfdff;\n    }\n\n    .box h3 {\n      margin: 0 0 8px;\n      font-size: .86rem;\n      text-transform: uppercase;\n      letter-spacing: .06em;\n    }\n\n    .added h3 {\n      color: var(--green);\n    }\n\n    .changed h3 {\n      color: var(--orange);\n    }\n\n    .fixed h3 {\n      color: var(--red);\n    }\n\n    ul {\n      margin: 0;\n      padding-left: 18px;\n    }\n\n    li {\n      margin: 5px 0;\n    }\n\n    code {\n      background: #eef4ff;\n      color: #123d7a;\n      border-radius: 5px;\n      padding: 1px 5px;\n      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n      font-size: .92em;\n    }\n\n    .wide {\n      grid-column: 1 / -1;\n    }\n\n    footer {\n      text-align: center;\n      color: var(--muted);\n      margin-top: 28px;\n      font-size: .92rem;\n    }\n\n    @media (max-width: 900px) {\n      .layout {\n        grid-template-columns: 1fr;\n      }\n\n      nav {\n        position: static;\n      }\n\n      .cols {\n        grid-template-columns: 1fr;\n      }\n\n      header {\n        padding: 28px 22px;\n      }\n    }\n\n    @media print {\n      body {\n        background: #fff;\n      }\n\n      nav {\n        display: none;\n      }\n\n      .layout {\n        grid-template-columns: 1fr;\n      }\n\n      header,\n      section {\n        box-shadow: none;\n        break-inside: avoid;\n      }\n    }",
  html: "<div class=\"wrap\">\n    <header>\n      <h1>CleanTime - Changelog</h1>\n      <p>Versionshistorik baserad på commit-filen från GitHub.</p>\n      <div class=\"meta\">\n        <span class=\"pill\">Aktuell version: v2.2.0</span>\n        <span class=\"pill\">Format: SemVer</span>\n        <span class=\"pill\">Uppdaterad: 2026-06-27</span>\n      </div>\n      <a class=\"home-button\" href=\"./\">← Till huvudmenyn</a>\n    </header>\n\n    \n    <div class=\"layout\">\n      <nav aria-label=\"Versionsmeny\">\n        <h2>Versioner</h2>\n        <a href=\"#v220\">v2.2.0 - Stabil version</a>\n        <a href=\"#v210\">v2.1.0 - Korrigeringar</a>\n        <a href=\"#v200\">v2.0.0 - Multi Event</a>\n        <a href=\"#v190\">v1.9.0 - Registrering</a>\n        <a href=\"#v180\">v1.8.0 - Startsida</a>\n        <a href=\"#v170\">v1.7.0 - Manuell registrering</a>\n        <a href=\"#v160\">v1.6.0 - QR och PDF</a>\n        <a href=\"#v150\">v1.5.0 - Admin</a>\n        <a href=\"#v140\">v1.4.0 - Statistik</a>\n        <a href=\"#v130\">v1.3.0 - Eventstöd</a>\n        <a href=\"#v120\">v1.2.0 - Totalvisning</a>\n        <a href=\"#v110\">v1.1.0 - Databas</a>\n        <a href=\"#v100\">v1.0.0 - Prototyp</a>\n      </nav>\n\n      <main>\n        <section id=\"v220\">\n          <h2>v2.2.0 - Stabil version med korrigeringar</h2>\n          <p class=\"date\">Datum: 2026-06-27</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Favicon och Apple touch-icon på sidorna.</li>\n                <li>Changelog-länk i huvudmenyn.</li>\n                <li>Aktuell version visas på startsidan.</li>\n                <li>Changelog-sida under <code>changelog/</code>.</li>\n                <li>Knapp tillbaka till huvudmenyn på changelog-sidan.</li>\n                <li>Copyright-kommentar i flera HTML-filer.</li>\n                <li>Validering som stoppar startår före 1953.</li>\n                <li>Lista över senaste manuella registreringar.</li>\n                <li>Visning av <code>created_at</code> för manuella registreringar.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Menytexten för <code>Skapa event / QR-koder</code> justerades.</li>\n\t\t<li>Justeringar på PDF-flyer.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Registrering med orimligt tidigt år blockeras.</li>\n                <li>Manuella registreringar blev lättare att hitta och korrigera.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v210\">\n          <h2>v2.1.0 - Korrigering av befintliga registreringar</h2>\n          <p class=\"date\">Datum: 2026-06-27</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Möjlighet att redigera en befintlig egen och manuell registrering.</li>\n                <li>Knapp för att uppdatera vald manuell registrering.</li>\n                <li>Knapp för att ta bort en manuell registrering.</li>\n                <li>Bekräftelsemeddelande när en registrering uppdateras.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Manuell registrering kan skapa ny rad eller uppdatera befintlig rad.</li>\n                <li>Vid uppdatering skrivs <code>clean_date</code> om på vald registrering.</li>\n                <li>Listan med manuella registreringar laddas om efter ändring.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Korrigering av manuellt registrerad tid syns nu i databasen.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v200\">\n          <h2>v2.0.0 - CleanTime Multi Event Edition</h2>\n          <p class=\"date\">Datum: 2026-06-06 till 2026-06-09</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Stöd för flera event.</li>\n                <li>Separata sidor för registrering, total, statistik, admin, manuell registrering, skapa event och historik.</li>\n                <li>Eventval via URL-parameter och event-slug.</li>\n                <li>Eventnamn visas i relevanta vyer.</li>\n                <li>Eventbaserade länkar mellan vyerna.</li>\n                <li>Stöd för att koppla registreringar till <code>event_id</code>.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Projektet flyttades från en samlad <code>index.html</code> till flersidesstruktur.</li>\n                <li>Registreringar började hanteras per event.</li>\n                <li>Dubbelregistreringsskyddet anpassades till <code>device_id + event_id</code>.</li>\n                <li>Navigeringen uppdaterades så valt event följer med mellan sidor.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Samma enhet kan registrera sig i olika event.</li>\n                <li>Fel vid saknat eller tomt event hanterades bättre.</li>\n                <li>Gamla filer och tillfälliga strukturer rensades bort.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v190\">\n          <h2>v1.9.0 - Förbättrad registrering och språkstöd</h2>\n          <p class=\"date\">Datum: 2026-06-06 till 2026-06-09</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Svensk och engelsk text i flera vyer.</li>\n                <li>Språkval med <code>SV</code> och <code>EN</code>.</li>\n                <li>Datumformat med åtta siffror: <code>ÅÅÅÅMMDD</code>.</li>\n                <li>Tydligare hjälptext för datum.</li>\n                <li>Texten \"Bara för idag\" i registreringsflödet.</li>\n                <li>NA-logotyp på sidorna.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Registreringssidan gjordes tydligare och mer centrerad.</li>\n                <li>Bekräftelse och felmeddelanden förbättrades.</li>\n                <li>Knappar, rubriker och hjälptexter harmoniserades.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Minskad risk för felaktigt datumformat.</li>\n                <li>Språkknappar och översatta etiketter justerades.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v180\">\n          <h2>v1.8.0 - Startsida och huvudmeny</h2>\n          <p class=\"date\">Datum: 2026-06-06 till 2026-06-09</p>\n          <div class=\"cols\">\n            <div class=\"box added wide\">\n              <h3>Tillagt och ändrat</h3>\n              <ul>\n                <li>Startsida med eventval.</li>\n                <li>Menyknappar till registrering, totalvisning, statistik, admin, manuell registrering och skapa event/QR.</li>\n                <li>Sparat eventval på enheten.</li>\n                <li>Felmeddelande om inget event är valt.</li>\n                <li>Länkar byggs dynamiskt utifrån valt event.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v170\">\n          <h2>v1.7.0 - Manuell registrering</h2>\n          <p class=\"date\">Datum: 2026-06-06</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Separat sida för manuell registrering.</li>\n                <li>Admin kan lägga in drogfri tid åt andra.</li>\n                <li>Egna <code>device_id</code> med prefix för manuell/adminregistrering.</li>\n                <li>Registreringen markeras med <code>created_by</code>.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Manuellt flöde separerades från vanlig användarregistrering.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Personer utan egen enhet kan registreras via admin/manuell inmatning.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v160\">\n          <h2>v1.6.0 - QR-koder, länkar och PDF-flyers</h2>\n          <p class=\"date\">Datum: 2026-06-07 till 2026-06-09</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Sida för att skapa event.</li>\n                <li>Automatisk generering av event-slug.</li>\n                <li>Länkar till registrering, totalvisning och statistik.</li>\n                <li>Kopieringsknappar för länkar.</li>\n                <li>QR-koder för eventlänkar.</li>\n                <li>PDF-flyer på svenska och engelska.</li>\n                <li>A4-anpassad PDF-layout.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Flyertexter, radbrytningar och rubriker justerades.</li>\n                <li>QR-kodens placering och storlek justerades.</li>\n                <li>Logotyp och sidfot i PDF-flyer justerades.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Textproblem och layoutproblem vid PDF-generering rättades.</li>\n                <li>Kopieringsfunktionen för länkar gjordes mer robust.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v150\">\n          <h2>v1.5.0 - Admin och export</h2>\n          <p class=\"date\">Datum: 2026-06-06 till 2026-06-08</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Adminsida.</li>\n                <li>Lista över registreringar per event.</li>\n                <li>Visning av skapad/uppdaterad tid.</li>\n                <li>Visning av <code>created_by</code>, <code>device_id</code>, <code>event_id</code> och aktiv status.</li>\n                <li>Möjlighet att ta bort och rensa registreringar.</li>\n                <li>Export till CSV-fil.</li>\n                <li>Enkel lösenordsruta för admin.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Adminvyn fick tydligare tabell och mer information per registrering.</li>\n                <li>Statistik i admin började hämtas från databasvyer/sammanfattningar.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Fel vid rensning och hantering av registreringar rättades.</li>\n                <li>Uppdatering av registrering sattes att skriva <code>updated_at</code>.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v140\">\n          <h2>v1.4.0 - Statistik</h2>\n          <p class=\"date\">Datum: 2026-06-07 till 2026-06-10</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Statistiksida.</li>\n                <li>Antal personer, total tid och genomsnittlig drogfri tid.</li>\n                <li>Längsta och kortaste drogfri tid.</li>\n                <li>Fördelning efter startår och drogfri tid.</li>\n                <li>Förklaring av hur tiden räknas.</li>\n                <li>Hantering av arkiverad historik/eventhistorik.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Statistik började hämtas från databasens sammanfattningar och statistikvyer.</li>\n                <li>Intervall för drogfri tid justerades och förtydligades.</li>\n                <li>År räknas som 365,25 dagar och månad som cirka 30,44 dagar.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Beräkningar av dagar, månader och år justerades.</li>\n                <li>Feltexter och tomma lägen för statistiktabeller förbättrades.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v130\">\n          <h2>v1.3.0 - Eventstöd</h2>\n          <p class=\"date\">Datum: 2026-06-06 till 2026-06-07</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Databasstöd för event.</li>\n                <li>Eventnamn och event-slug.</li>\n                <li>Eventval i gränssnittet.</li>\n                <li>Eventkoppling i registreringar.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Registreringsflödet började läsa valt event från URL eller sparat val.</li>\n                <li>Totalvisning och statistik kopplades till valt event.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Fel vid eventhämtning och saknat event hanterades tydligare.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v120\">\n          <h2>v1.2.0 - Totalvisning och livevy</h2>\n          <p class=\"date\">Datum: 2026-06-05 till 2026-06-06</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Totalsida för drogfri tid.</li>\n                <li>Totalt antal drogfria dagar och antal personer.</li>\n                <li>Total tid omräknad till år, månader och dagar.</li>\n                <li>Medel, längsta och kortaste tid.</li>\n                <li>Automatisk uppdatering.</li>\n                <li>Flip-räknare med sju siffror.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Totalvisningen anpassades för storbild/livevisning.</li>\n                <li>Uppdateringsintervall justerades till 60 sekunder.</li>\n                <li>Räknaren byggdes om från enkel text till animerad siffer-/flipvisning.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Felräkning runt startdag och totaldagar justerades.</li>\n                <li>Förklaringstexten för tidsberäkning korrigerades.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v110\">\n          <h2>v1.1.0 - Databas, Supabase och dubbelregistreringsskydd</h2>\n          <p class=\"date\">Datum: 2026-06-04 till 2026-06-05</p>\n          <div class=\"cols\">\n            <div class=\"box added\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Supabase-koppling.</li>\n                <li>Databastabell för registreringar: <code>clean_time_entries</code>.</li>\n                <li>Sparning av registreringar i databas.</li>\n                <li><code>device_id</code> för att identifiera samma enhet.</li>\n                <li>Skydd mot dubbelregistrering per enhet.</li>\n                <li>Hämtning av registreringar från databasen för sammanställning.</li>\n              </ul>\n            </div>\n            <div class=\"box changed\">\n              <h3>Ändrat</h3>\n              <ul>\n                <li>Appen gick från lokal/prototypbaserad hantering till databasdriven registrering.</li>\n                <li>Supabase-klienten standardiserades till <code>supabaseClient</code>.</li>\n              </ul>\n            </div>\n            <div class=\"box fixed\">\n              <h3>Fixat</h3>\n              <ul>\n                <li>Problem med Supabase-konfiguration.</li>\n                <li>Problem med RLS/policy vid insert.</li>\n                <li>Problem med dubbletter.</li>\n                <li>Fel vid tomma datamängder.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n        <section id=\"v100\">\n          <h2>v1.0.0 - Första prototypen</h2>\n          <p class=\"date\">Datum: 2026-06-04</p>\n          <div class=\"cols\">\n            <div class=\"box added wide\">\n              <h3>Tillagt</h3>\n              <ul>\n                <li>Första HTML-versionen av CleanTime.</li>\n                <li>Formulär för registrering av drogfri tid.</li>\n                <li>Datumfält för startdatum.</li>\n                <li>Grundläggande beräkning av antal drogfria dagar.</li>\n                <li>Grundläggande visuell design.</li>\n                <li>Visning av sammanställning direkt på sidan.</li>\n              </ul>\n            </div>\n          </div>\n        </section>\n\n       \n

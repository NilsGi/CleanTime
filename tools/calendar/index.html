<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NA Sverige Kalender</title>

<style>
:root {
  --na-blue: #101b8f;
  --na-blue-dark: #071163;
  --na-blue-soft: #eef1ff;
  --bg: #eef3f8;
  --card: #ffffff;
  --text: #102033;
  --muted: #607086;
  --border: #d7e2ee;
  --shadow: 0 10px 30px rgba(16, 42, 67, .10);
  --shadow-soft: 0 3px 12px rgba(16, 42, 67, .08);
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(16, 27, 143, .13), transparent 34rem),
    linear-gradient(180deg, #f7f9fd 0%, var(--bg) 100%);
  color: var(--text);
}

.site-header {
  background: var(--na-blue);
  color: #fff;
  padding: 14px 20px;
  min-height: 74px;
  display: flex;
  align-items: center;
  box-shadow: none;
  position: relative;
  z-index: 20;
}

.header-inner {
  width: 100%;
  max-width: none;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-logo {
  height: 44px;
  width: auto;
  display: block;
}

.header-title {
  display: flex;
  align-items: center;
  line-height: 1;
}

.header-title h1 {
  margin: 0;
  color: #fff;
  font-size: 28px;
  font-weight: 850;
  letter-spacing: -.02em;
  line-height: 1;
}

.back-button {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 7px 14px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,.55);
  background: rgba(255,255,255,.14);
  color: #fff;
  text-decoration: none;
  font-weight: 800;
  font-size: 16px;
  line-height: 1;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
}

.back-button:hover { background: rgba(255,255,255,.20); }

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 22px 20px 44px;
}

.hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: end;
  margin: 8px 0 18px;
}

.hero h2 {
  margin: 0;
  font-size: clamp(30px, 4vw, 46px);
  line-height: 1.02;
  letter-spacing: -.04em;
  color: var(--na-blue-dark);
}

.hero p {
  max-width: 760px;
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.45;
}

#status {
  justify-self: end;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  padding: 8px 13px;
  border-radius: 999px;
  background: #fff;
  border: 1px solid var(--border);
  color: var(--na-blue);
  font-weight: 800;
  box-shadow: var(--shadow-soft);
  white-space: nowrap;
}

#status::before {
  content: "";
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--na-blue);
  box-shadow: 0 0 0 4px rgba(16, 27, 143, .11);
}

.toolbar {
  background: rgba(255,255,255,.94);
  border: 1px solid rgba(215,226,238,.95);
  padding: 16px;
  border-radius: 18px;
  display: grid;
  grid-template-columns: minmax(210px, 1.4fr) minmax(150px, .9fr) minmax(150px, .9fr) minmax(230px, 1.2fr) minmax(160px, .9fr);
  gap: 12px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(8px);
}

.field {
  min-width: 0;
}

.field label {
  display: block;
  margin: 0 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}

input, select, button {
  width: 100%;
  padding: 11px 12px;
  font: inherit;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 11px;
}

input, select {
  background: #fff;
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
}

input:focus, select:focus {
  outline: 3px solid rgba(16, 27, 143, .14);
  border-color: var(--na-blue);
}

button {
  cursor: pointer;
  background: var(--na-blue);
  color: #fff;
  border-color: var(--na-blue);
  font-weight: 800;
  box-shadow: 0 3px 10px rgba(16, 27, 143, .20);
}

button:hover { filter: brightness(1.06); }

.view-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}

.view-buttons button {
  padding: 11px 8px;
  background: var(--na-blue-soft);
  color: var(--na-blue);
  border: 1px solid rgba(16, 27, 143, .18);
  box-shadow: none;
}

.view-buttons button.is-active {
  background: var(--na-blue);
  color: #fff;
  border-color: var(--na-blue);
  box-shadow: 0 3px 10px rgba(16, 27, 143, .20);
}

#calendar { animation: fadeIn .18s ease-out; }

@keyframes fadeIn {
  from { opacity: .5; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}

.event-list {
  display: grid;
  gap: 14px;
}

.event-card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 18px 18px 20px;
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}

.event-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  background: var(--na-blue);
}

.event-card-top {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.event-card h2 {
  margin: 0 0 9px;
  color: var(--na-blue-dark);
  font-size: clamp(20px, 2.3vw, 26px);
  line-height: 1.15;
  letter-spacing: -.02em;
}

.event-card p {
  margin: 10px 0 0;
  line-height: 1.55;
}

.meta {
  color: var(--muted);
  margin-bottom: 8px;
  line-height: 1.5;
  font-weight: 600;
}

.type, .event-date-pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  background: var(--na-blue-soft);
  color: var(--na-blue);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 850;
}

.event-date-pill {
  background: #f5f7fb;
  color: var(--muted);
  border: 1px solid var(--border);
}

details {
  margin-top: 10px;
  border-top: 1px dashed var(--border);
  padding-top: 10px;
}

summary {
  cursor: pointer;
  color: var(--na-blue);
  font-weight: 850;
}

.actions {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.actions a, .actions button {
  width: auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  background: var(--na-blue);
  color: #fff;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1px solid var(--na-blue);
  font-size: 14px;
  font-weight: 850;
  min-height: 38px;
}

.actions a:nth-child(n+2), .actions button:nth-child(n+2) {
  background: var(--na-blue-soft);
  color: var(--na-blue);
  border-color: rgba(16, 27, 143, .18);
  box-shadow: none;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 9px;
}

.month-heading {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 15px 18px;
  color: var(--na-blue-dark);
  box-shadow: var(--shadow-soft);
  font-weight: 900;
  font-size: 22px;
  text-transform: capitalize;
}

.day-name {
  font-weight: 900;
  color: var(--muted);
  text-align: center;
  padding: 9px 8px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.day {
  background: #fff;
  min-height: 132px;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 9px;
  box-shadow: 0 1px 5px rgba(16,42,67,.05);
}

.day.is-today {
  outline: 3px solid rgba(16, 27, 143, .14);
  border-color: var(--na-blue);
}

.day.empty {
  background: rgba(255,255,255,.45);
  box-shadow: none;
}

.day-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 26px;
  height: 26px;
  border-radius: 999px;
  font-weight: 900;
  margin-bottom: 7px;
  color: var(--na-blue-dark);
}

.day.is-today .day-number {
  background: var(--na-blue);
  color: #fff;
}

.day-event {
  background: var(--na-blue-soft);
  color: var(--na-blue);
  border: 1px solid rgba(16, 27, 143, .12);
  padding: 6px 7px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  line-height: 1.25;
  cursor: pointer;
  font-weight: 750;
}

.day-event.is-multiday {
  display: flex;
  align-items: center;
  gap: 5px;
  border-color: rgba(16, 27, 143, .28);
}

.day-event.is-start {
  border-radius: 8px 3px 3px 8px;
}

.day-event.is-middle {
  border-radius: 3px;
}

.day-event.is-end {
  border-radius: 3px 8px 8px 3px;
}

.day-event .event-flow {
  flex: 0 0 auto;
  font-weight: 950;
  opacity: .85;
}

.day-event .event-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.day-event:hover {
  background: var(--na-blue);
  color: #fff;
}

.week-list {
  display: grid;
  gap: 14px;
}

.week-day {
  background: #fff;
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 18px;
  box-shadow: var(--shadow-soft);
}

.week-day h3 {
  margin: 0 0 12px;
  color: var(--na-blue-dark);
  font-size: 22px;
  text-transform: capitalize;
}

.week-day > p {
  color: var(--muted);
  margin: 0;
}

.empty-state {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  text-align: center;
  color: var(--muted);
  box-shadow: var(--shadow-soft);
}

.empty-state b {
  display: block;
  color: var(--na-blue-dark);
  font-size: 22px;
  margin-bottom: 6px;
}

@media (max-width: 1050px) {
  .toolbar {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .field.full-mobile {
    grid-column: 1 / -1;
  }
}

@media (max-width: 800px) {
  .site-header { padding: 12px 14px; min-height: 66px; }
  .header-inner { gap: 12px; }
  .header-logo { height: 40px; }
  .header-title h1 { font-size: 22px; }
  .back-button { min-height: 34px; padding: 6px 12px; font-size: 15px; }

  main { padding: 18px 14px 32px; }

  .hero {
    grid-template-columns: 1fr;
    align-items: start;
  }

  #status { justify-self: start; white-space: normal; }

  .toolbar { grid-template-columns: 1fr; border-radius: 16px; }

  .calendar-grid { grid-template-columns: 1fr; }
  .month-heading { font-size: 20px; }
  .day-name { display: none; }
  .day { min-height: auto; }

  .event-card { padding: 17px 16px 17px 19px; }
  .actions a, .actions button { width: 100%; }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <img src="/assets/na-logo-vit.png" alt="NA Sverige" class="header-logo">
    <div class="header-title">
      <h1>Kalender</h1>
    </div>
    <a class="back-button" href="/tools">Tillbaka</a>
  </div>
</header>

<main>

<section class="hero" aria-labelledby="pageTitle">
  <div>
    <h2 id="pageTitle">Kommande händelser</h2>
    <p>Här hittar du event, distriktsmöten, UKSAM och regionsmöten. Filtrera, växla vy och lägg till händelser i din egen kalender.</p>
  </div>
  <div id="status">Laddar kalender...</div>
</section>

<section class="toolbar" aria-label="Filtrera kalender">
  <div class="field">
    <label for="search">Sök</label>
    <input id="search" placeholder="Sök evenemang...">
  </div>

  <div class="field">
    <label for="typeFilter">Typ</label>
    <select id="typeFilter">
      <option value="">Alla typer</option>
      <option value="event">Event</option>
      <option value="distrikt">Distrikt</option>
      <option value="uksam">UKSAM</option>
      <option value="region">Region</option>
    </select>
  </div>

  <div class="field">
    <label for="monthFilter">Månad</label>
    <select id="monthFilter"></select>
  </div>

  <div class="field full-mobile">
    <label>Vy</label>
    <div class="view-buttons">
      <button type="button" data-view="list" onclick="setView('list')">Lista</button>
      <button type="button" data-view="week" onclick="setView('week')">Vecka</button>
      <button type="button" data-view="month" onclick="setView('month')">Månad</button>
    </div>
  </div>

  <div class="field">
    <label>&nbsp;</label>
    <button type="button" onclick="downloadAllIcs()">Prenumerera / ICS</button>
  </div>
</section>

<div id="calendar"></div>

</main>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allEvents = [];
let currentView = "list";
let selectedMonth = new Date();

const calendar = document.getElementById("calendar");
const status = document.getElementById("status");

document.getElementById("search").addEventListener("input", render);
document.getElementById("typeFilter").addEventListener("change", render);
document.getElementById("monthFilter").addEventListener("change", e => {
  const [year, month] = e.target.value.split("-").map(Number);
  selectedMonth = new Date(year, month - 1, 1);
  currentView = "month";
  render();
});

init();

async function init() {
  buildMonthFilter();

  const { data, error } = await supabase
    .from("calendar_events")
    .select("*")
    .eq("is_published", true)
    .eq("is_hidden", false)
    .order("start_datetime", { ascending: true });

  if (error) {
    status.textContent = "Kunde inte hämta kalendern.";
    return;
  }

  allEvents = data || [];
  const upcomingCount = allEvents.filter(e => !isPastEvent(e)).length;
  status.textContent = `${upcomingCount} kommande händelser`;
  render();
}

function buildMonthFilter() {
  const select = document.getElementById("monthFilter");
  const now = new Date();

  for (let i = 0; i < 18; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const value =
      d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    const label = d.toLocaleDateString("sv-SE", {
      year: "numeric",
      month: "long"
    });

    select.innerHTML += `<option value="${value}">${label}</option>`;
  }
}

window.setView = function(view) {
  currentView = view;
  render();
};

function updateViewButtons() {
  document.querySelectorAll("[data-view]").forEach(button => {
    const active = button.dataset.view === currentView;
    button.classList.toggle("is-active", active);
    button.setAttribute("aria-pressed", active ? "true" : "false");
  });
}

function getFilteredEvents(options = {}) {
  const search = document.getElementById("search").value.toLowerCase();
  const type = document.getElementById("typeFilter").value;
  const includePast = options.includePast === true;
  const now = new Date();

  return allEvents.filter(e => {
    // Listvy och veckovy visar bara aktuella/kommande event.
    // Månadsvyn kan visa historiska månader när man väljer dem i filtret.
    if (!includePast && isPastEvent(e, now)) {
      return false;
    }

    const text = [
      e.title,
      e.organizer,
      e.address,
      e.excerpt,
      e.description
    ].join(" ").toLowerCase();

    if (search && !text.includes(search)) return false;
    if (type && e.event_type !== type) return false;

    return true;
  });
}

function render() {
  updateViewButtons();

  // Månadsvy får visa vald månad även om den ligger bakåt i tiden.
  // Listvy och veckovy visar bara pågående/kommande event.
  const events = getFilteredEvents({
    includePast: currentView === "month"
  });

  if (currentView === "month") renderMonth(events);
  else if (currentView === "week") renderWeek(events);
  else renderList(events);
}

function renderList(events) {
  calendar.className = "event-list";

  if (!events.length) {
    calendar.innerHTML = `
      <div class="empty-state">
        <b>Inga händelser hittades</b>
        Prova att ändra sökningen, typen eller månadsvyn.
      </div>
    `;
    return;
  }

  calendar.innerHTML = events.map(eventCard).join("");
}

function renderWeek(events) {
  calendar.className = "week-list";

  const start = startOfWeek(new Date());
  const days = [];

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    days.push(d);
  }

  calendar.innerHTML = days.map(day => {
    const dayEvents = events.filter(e => eventOccursOnDate(e, day));

    return `
      <div class="week-day">
        <h3>${day.toLocaleDateString("sv-SE", { weekday: "long", day: "numeric", month: "long" })}</h3>
        ${dayEvents.length ? dayEvents.map(eventCard).join("") : "<p>Inga händelser.</p>"}
      </div>
    `;
  }).join("");
}

function renderMonth(events) {
  calendar.className = "calendar-grid";

  const year = selectedMonth.getFullYear();
  const month = selectedMonth.getMonth();

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);

  const startOffset = (first.getDay() + 6) % 7;
  const totalDays = startOffset + last.getDate();

  const dayNames = ["Mån", "Tis", "Ons", "Tor", "Fre", "Lör", "Sön"];
  const monthLabel = selectedMonth.toLocaleDateString("sv-SE", {
    year: "numeric",
    month: "long"
  });

  let html = `<div class="month-heading">${monthLabel}</div>`;
  html += dayNames.map(d => `<div class="day-name">${d}</div>`).join("");

  for (let i = 0; i < totalDays; i++) {
    if (i < startOffset) {
      html += `<div class="day empty"></div>`;
      continue;
    }

    const dayNumber = i - startOffset + 1;
    const date = new Date(year, month, dayNumber);
    const todayClass = sameDay(date, new Date()) ? " is-today" : "";

    const dayEvents = events.filter(e =>
      eventOccursOnDate(e, date)
    );

    html += `
      <div class="day${todayClass}">
        <div class="day-number">${dayNumber}</div>
        ${dayEvents.map(e => monthEventPill(e, date)).join("")}
      </div>
    `;
  }

  calendar.innerHTML = html;
}

function monthEventPill(event, date) {
  const placement = getEventDayPlacement(event, date);
  const className = [
    "day-event",
    placement.isMultiDay ? "is-multiday" : "",
    placement.isMultiDay ? `is-${placement.position}` : ""
  ].filter(Boolean).join(" ");

  const startArrow = placement.showBackArrow
    ? `<span class="event-flow" aria-hidden="true">&larr;</span>`
    : "";
  const endArrow = placement.showForwardArrow
    ? `<span class="event-flow" aria-hidden="true">&rarr;</span>`
    : "";
  const displayTime = placement.showStartTime
    ? `${time(event.start_datetime)} `
    : placement.showEndTime
      ? `${time(event.end_datetime)} `
      : "";

  const label = placement.isMultiDay
    ? `${placement.dayLabel}. ${event.title}`
    : event.title;

  return `
    <div class="${className}" onclick="showEvent('${event.id}')" title="${escapeAttr(label)}">
      ${startArrow}
      <span class="event-title">${displayTime}${escapeHtml(event.title)}</span>
      ${endArrow}
    </div>
  `;
}

function eventCard(e) {
  return `
    <article class="event-card" id="event-${e.id}">
      <div class="event-card-top">
        <span class="type">${labelType(e.event_type)}</span>
        <span class="event-date-pill">${formatDateShort(e.start_datetime)}</span>
      </div>

      <h2>${escapeHtml(e.title)}</h2>

      <div class="meta">
        ${formatDate(e.start_datetime)}
        ${e.end_datetime ? " – " + formatDate(e.end_datetime) : ""}
        ${e.organizer ? "<br>Arrangör: " + escapeHtml(e.organizer) : ""}
        ${e.address ? "<br>Plats: " + escapeHtml(e.address) : ""}
      </div>

      ${e.excerpt ? `<p>${escapeHtml(e.excerpt)}</p>` : ""}
      ${e.description ? `<details><summary>Mer information</summary><p>${escapeHtml(e.description)}</p></details>` : ""}

      <div class="actions">
        ${e.web_url ? `<a href="${escapeAttr(e.web_url)}" target="_blank">Öppna länk</a>` : ""}
        <button type="button" onclick="downloadEventIcs('${e.id}')">Lägg till i kalender</button>
        <a href="${googleCalendarUrl(e)}" target="_blank">Google Kalender</a>
      </div>
    </article>
  `;
}

window.showEvent = function(id) {
  currentView = "list";
  render();

  setTimeout(() => {
    document.getElementById("event-" + id)?.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 50);
};

window.downloadEventIcs = function(id) {
  const event = allEvents.find(e => e.id === id);
  if (!event) return;

  downloadFile(
    slug(event.title) + ".ics",
    createIcs([event])
  );
};

window.downloadAllIcs = function() {
  downloadFile(
    "na-sverige-kalender.ics",
    createIcs(getFilteredEvents())
  );
};

function createIcs(events) {
  const now = icsDate(new Date());

  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//NA Sverige//Kalender//SV",
    "CALSCALE:GREGORIAN",
    ...events.flatMap(e => [
      "BEGIN:VEVENT",
      `UID:${e.id}@nasverige-kalender`,
      `DTSTAMP:${now}`,
      `DTSTART:${icsDate(new Date(e.start_datetime))}`,
      e.end_datetime ? `DTEND:${icsDate(new Date(e.end_datetime))}` : "",
      `SUMMARY:${icsEscape(e.title)}`,
      e.address ? `LOCATION:${icsEscape(e.address)}` : "",
      `DESCRIPTION:${icsEscape([e.excerpt, e.description, e.web_url].filter(Boolean).join("\\n\\n"))}`,
      e.web_url ? `URL:${e.web_url}` : "",
      "END:VEVENT"
    ].filter(Boolean)),
    "END:VCALENDAR"
  ].join("\r\n");
}

function googleCalendarUrl(e) {
  const start = googleDate(new Date(e.start_datetime));
  const end = e.end_datetime
    ? googleDate(new Date(e.end_datetime))
    : googleDate(new Date(new Date(e.start_datetime).getTime() + 60 * 60 * 1000));

  const params = new URLSearchParams({
    action: "TEMPLATE",
    text: e.title || "",
    dates: `${start}/${end}`,
    details: [e.excerpt, e.description, e.web_url].filter(Boolean).join("\n\n"),
    location: e.address || ""
  });

  return "https://calendar.google.com/calendar/render?" + params.toString();
}

function startOfWeek(date) {
  const d = new Date(date);
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}

function eventOccursOnDate(event, date) {
  if (!event.start_datetime) return false;

  const start = new Date(event.start_datetime);
  const end = event.end_datetime
    ? new Date(event.end_datetime)
    : new Date(event.start_datetime);

  const dayStart = new Date(date);
  dayStart.setHours(0, 0, 0, 0);

  const dayEnd = new Date(date);
  dayEnd.setHours(23, 59, 59, 999);

  return start <= dayEnd && end >= dayStart;
}

function getEventDayPlacement(event, date) {
  const start = new Date(event.start_datetime);
  const end = event.end_datetime
    ? new Date(event.end_datetime)
    : new Date(event.start_datetime);

  const isStartDay = sameDay(start, date);
  const isEndDay = sameDay(end, date);
  const isMultiDay = !sameDay(start, end);

  let position = "single";
  if (isMultiDay && isStartDay) position = "start";
  else if (isMultiDay && isEndDay) position = "end";
  else if (isMultiDay) position = "middle";

  return {
    position,
    isMultiDay,
    showBackArrow: isMultiDay && !isStartDay,
    showForwardArrow: isMultiDay && !isEndDay,
    showStartTime: !isMultiDay || isStartDay,
    showEndTime: isMultiDay && isEndDay,
    dayLabel: getEventDayLabel(start, end, date)
  };
}

function getEventDayLabel(start, end, date) {
  const startDay = stripTime(start);
  const endDay = stripTime(end);
  const currentDay = stripTime(date);

  const dayIndex = Math.round((currentDay - startDay) / 86400000) + 1;
  const totalDays = Math.round((endDay - startDay) / 86400000) + 1;

  return `Dag ${dayIndex} av ${totalDays}`;
}

function stripTime(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  return d;
}

function isPastEvent(event, now = new Date()) {
  if (!event.start_datetime) return true;

  const end = event.end_datetime
    ? new Date(event.end_datetime)
    : new Date(event.start_datetime);

  return end < now;
}

function formatDate(value) {
  if (!value) return "";
  return new Date(value).toLocaleString("sv-SE", {
    weekday: "short",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatDateShort(value) {
  if (!value) return "";
  return new Date(value).toLocaleDateString("sv-SE", {
    day: "numeric",
    month: "short"
  });
}

function time(value) {
  return new Date(value).toLocaleTimeString("sv-SE", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function icsDate(date) {
  return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
}

function googleDate(date) {
  return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
}

function icsEscape(text) {
  return String(text || "")
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\n/g, "\\n");
}

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, "&quot;");
}

function labelType(type) {
  return {
    event: "Event",
    distrikt: "Distrikt",
    uksam: "UKSAM",
    region: "Region"
  }[type] || type || "Event";
}

function slug(text) {
  return String(text || "event")
    .toLowerCase()
    .replace(/[^a-z0-9åäö]+/gi, "-")
    .replace(/^-|-$/g, "");
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}
</script>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Importera NA-event</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
}

pre {
    background: #f5f5f5;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h1>Importera NA-event</h1>

<button onclick="importEvents()">
    Importera alla event
</button>

<pre id="log"></pre>

<script type="module">
import { createClient }
from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://kycekthmuiqcqegpqugi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6ciJsZubiknj8wjbVzb2HQ_q1TJscdo";

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const log = document.getElementById("log");

window.importEvents = async function () {
  try {
    log.textContent = "Startar import...\n";

    const events = await fetchAllEvents();

      log.textContent += "\nFält i första eventet:\n";
log.textContent += Object.keys(events[0]).join(", ") + "\n\n";

log.textContent += "Första eventet rådata:\n";
log.textContent += JSON.stringify(events[0], null, 2);
return;

    log.textContent += `\nTotalt hämtade: ${events.length} event\n`;
    log.textContent += "Sparar till Supabase...\n";

    const rows = events.map(event => ({
      source: "nasverige",
      external_id: String(event.id),
      external_slug: event.slug || null,

      title: event.title || "Namnlöst evenemang",
      organizer: event.organizer || null,
      address: event.address || null,
      price: event.price || null,

      start_datetime: event.startDate || null,
      end_datetime: event.endDate || null,

      web_url:
            event.webUrl ||
            event.webURL ||
            event.web_url ||
            event.url ||
          event.link ||
          event.website ||
          null,
      excerpt: event.excerpt || null,
      description: event.description || null,

      image_url: getImageUrl(event),

      raw_data: event,

      is_published: true,
      is_hidden: false
    }));

    const { data, error } = await supabase
      .from("calendar_events")
      .upsert(rows, {
        onConflict: "source,external_id"
      })
      .select();

    if (error) {
      log.textContent +=
        "\nFEL:\n" +
        JSON.stringify(error, null, 2);
      return;
    }

    log.textContent +=
      `\nKlart!\n` +
      `Sparade/uppdaterade ${data.length} event.`;

  } catch (e) {
    log.textContent +=
      "\nFEL:\n" +
      e.message;
  }
};

async function fetchAllEvents() {
  let page = 1;
  let allEvents = [];

  while (true) {
    log.textContent +=
      `Hämtar sida ${page}...\n`;

    const res = await fetch(`/event?page=${page}`);

    if (!res.ok) {
      throw new Error(
        `Fel ${res.status} på sida ${page}`
      );
    }

    const data = await res.json();

    const events =
      data.events ||
      data.data ||
      [];

    log.textContent +=
      `Sida ${page}: ${events.length} event\n`;

    allEvents = allEvents.concat(events);

    const pagination =
      data.meta?.pagination;

    if (!pagination) {
      break;
    }

    if (page >= pagination.pageCount) {
      break;
    }

    page++;
  }

  return allEvents;
}

function getImageUrl(event) {
  const image =
    event.images?.[0] ||
    event.images?.data?.[0];

  if (!image) {
    return null;
  }

  const url =
    image.url ||
    image.attributes?.url;

  if (!url) {
    return null;
  }

  return url.startsWith("http")
    ? url
    : "https://cms.nasverige.org" + url;
}
</script>

</body>
</html>

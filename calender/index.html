<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA Sverige Kalender</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

#status {
    text-align: center;
    margin-bottom: 20px;
    color: #666;
}

#events {
    max-width: 1000px;
    margin: auto;
}

.event {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

.event h2 {
    margin-top: 0;
}

.meta {
    color: #666;
    margin-bottom: 10px;
}

.description {
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h1>NA Sverige Evenemang</h1>

<div id="status">Laddar evenemang...</div>

<div id="events"></div>

<script>
async function loadEvents() {
    const status = document.getElementById("status");
    const container = document.getElementById("events");

    try {
        const response = await fetch("/event");

        if (!response.ok) {
            throw new Error(`Fel ${response.status}`);
        }

        const data = await response.json();

        console.log(data);

        // Om event.js returnerar hela Strapi-svaret
        const events = data.data || data.events || [];

        status.innerHTML = `${events.length} evenemang hittades`;

        container.innerHTML = "";

        if (events.length === 0) {
            container.innerHTML = "<p>Inga evenemang hittades.</p>";
            return;
        }

        events.forEach(event => {

            const attrs = event.attributes || event;

            const title =
                attrs.title ||
                attrs.name ||
                "Namnlöst evenemang";

            const start =
                attrs.startDate ||
                attrs.start ||
                attrs.date ||
                "";

            const description =
                attrs.description ||
                "";

            const location =
                attrs.location ||
                attrs.place ||
                "";

            container.innerHTML += `
                <div class="event">
                    <h2>${title}</h2>

                    <div class="meta">
                        ${start}
                        ${location ? " • " + location : ""}
                    </div>

                    <div class="description">
                        ${description}
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
        status.innerHTML =
            `Kunde inte hämta event: ${error.message}`;
    }
}

loadEvents();
</script>

</body>
</html>
